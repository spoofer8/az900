<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 3 · Management and governance</span></div>
    <h1 class="q-title">Cost management</h1>
    <p class="q-subtitle">Cost factors, calculators, Cost Management + Billing, savings options.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
      <div class="feedback" id="feedback"><div class="feedback-verdict" id="feedback-verdict"></div><div class="feedback-explanation" id="feedback-explanation"></div></div>
      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>
  </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>
    </div>
    <h2 class="review-title">Review</h2>
    <div id="review"></div>
  </div>

</div>

<script>
window.QUIZ_META = { title: "Cost management", code: "3.1", domain: "Domain 3" };

window.QUIZ_QUESTIONS = [
  // EASY
  { q: "Which is NOT a factor affecting Azure cost?", o: ["Resource type", "Geographic region", "Consumption/usage", "The colour of your logo"], a: 3, d: "easy", e: "Cost factors: resource type, consumption, maintenance state, region, network egress, subscription type. Colour doesn't feature." },
  { q: "Which tool estimates the cost of new Azure workloads BEFORE deployment?", o: ["Pricing Calculator", "TCO Calculator", "Cost Management + Billing", "Azure Advisor"], a: 0, d: "easy", e: "Pricing Calculator estimates cost of new Azure workloads. TCO Calculator compares Azure to on-prem." },
  { q: "Which tool compares Azure's cost with running the same workload on-premises?", o: ["Pricing Calculator", "Cost Management + Billing", "TCO Calculator", "Azure Monitor"], a: 2, d: "easy", e: "TCO (Total Cost of Ownership) Calculator projects the 5-year cost of on-prem vs Azure — a business-case tool." },
  { q: "Which is used to view actual spend, set budgets, and get cost alerts in Azure?", o: ["Pricing Calculator", "TCO Calculator", "Azure Advisor", "Cost Management + Billing"], a: 3, d: "easy", e: "Cost Management + Billing is the portal blade for tracking actual spend, setting budgets, and receiving alerts." },
  { q: "Which VM billing state means COMPUTE is NOT billed?", o: ["Deallocated from Portal or CLI", "Running normally on the host", "Stopped from within the guest OS", "Currently rebooting after updates"], a: 0, d: "easy", e: "Stopped-deallocated releases the VM from the host and stops compute billing. Just 'Stopped' (from OS) still incurs compute charges." },
  { q: "Which is TRUE about Azure network billing?", o: ["Ingress and egress are both billed", "Ingress is free; egress is billed", "Ingress is billed; egress is free", "Neither ingress nor egress is billed"], a: 1, d: "easy", e: "Data into Azure (ingress) is free. Data leaving Azure (egress) is billed." },
  { q: "Reserved Instances offer up to what percentage discount vs pay-as-you-go?", o: ["10%", "72%", "30%", "95%"], a: 1, d: "easy", e: "Reserved Instances can save up to 72% for 1- or 3-year commitments on predictable workloads." },
  { q: "Reserved Instance commitment periods are:", o: ["30 days or 90 days rolling terms", "1 month with monthly renewal", "5 years fixed term only", "1 year or 3 years upfront"], a: 3, d: "easy", e: "RI commitments: 1 year or 3 years. Longer commitments = deeper discount." },
  { q: "Azure Hybrid Benefit lets you:", o: ["Receive free Azure credits monthly", "Skip Microsoft licensing requirements entirely", "Bring existing Windows/SQL/Linux licences", "Reserve VM compute capacity in advance"], a: 2, d: "easy", e: "Hybrid Benefit = BYOL (Bring Your Own Licence) for Windows / SQL / RHEL / SUSE. Combines with Reservations for further savings." },
  { q: "Spot VMs offer up to what discount?", o: ["90%", "30%", "72%", "10%"], a: 0, d: "easy", e: "Spot VMs can be up to 90% off — but can be evicted at any time with 30 seconds notice." },
  { q: "The main trade-off of Spot VMs is:", o: ["They cost more than reserved capacity", "They are limited to a single Azure region", "Azure can evict them when it needs capacity", "They require ExpressRoute connectivity"], a: 2, d: "easy", e: "Spot VMs are cheap but evictable. Ideal for interruptible batch work with checkpointing." },
  { q: "What are Azure Tags?", o: ["Key-value metadata on Azure resources", "Physical labels attached to datacentre servers", "Snapshots used as backup markers", "Named collections of Azure regions"], a: 0, d: "easy", e: "Tags are metadata (key/value pairs) — used for cost allocation, ownership, environment, etc." },
  { q: "The maximum number of tags per Azure resource is:", o: ["10", "25", "Unlimited", "50"], a: 3, d: "easy", e: "Up to 50 tags per resource, key-value format, case-insensitive keys." },
  { q: "Tags are inherited from a resource group by default:", o: ["Yes, automatically from resource group to resource", "Only for resources in production tier", "No — Policy is needed to enforce inheritance", "Only for virtual machines and disks"], a: 2, d: "easy", e: "Tags are NOT auto-inherited. If you want inheritance, use Azure Policy to append parent tags to child resources." },
  { q: "Dev/Test subscriptions in Azure offer:", o: ["Discount rates for non-production use", "No discount versus pay-as-you-go", "Available only for production workloads", "Available only in Azure Government cloud"], a: 0, d: "easy", e: "Dev/Test subs give discounted rates for non-production — must have a Visual Studio subscription. Using them for prod violates licensing." },
  { q: "Azure Savings Plans commit you to:", o: ["A specific VM SKU in a specific region for 1 or 3 years", "An unlimited spend cap across the tenant", "A no-cost commitment with no discount", "A fixed hourly spend for 1 or 3 years across VM SKUs"], a: 3, d: "easy", e: "Savings Plans = commit to $X/hour for 1/3 years. More flexible than RIs — applies across SKUs and regions." },
  { q: "Cross-region data transfer in Azure:", o: ["Is free across all Azure regions worldwide", "Incurs egress cost, often above internet egress", "Is free only for virtual machine traffic", "Is only billed within Azure China regions"], a: 1, d: "easy", e: "Moving data between Azure regions is billed as egress, and cross-region egress rates are typically higher than internet egress." },
  { q: "Which of these is TRUE about Azure region pricing?", o: ["Every region charges identical prices per SKU", "Prices vary by region for the same SKU", "Only Azure Government is priced higher", "Only Azure China is priced lower"], a: 1, d: "easy", e: "Prices vary by region — for the same SKU, some regions are cheaper than others due to local operating costs." },
  { q: "What is the primary purpose of setting a budget in Azure Cost Management?", o: ["To physically block resource deployment at the cap", "To purchase Reserved Instances automatically", "To track spend and alert at set thresholds", "To disable non-compliant Azure services"], a: 2, d: "easy", e: "Budgets track actual and forecasted spend, and send alerts. They do NOT automatically block resource creation — pair with automation for that." },
  { q: "Azure Advisor provides recommendations in which category related to cost?", o: ["Reliability recommendations only", "Cost right-sizing and reservations", "Performance recommendations only", "Security recommendations only"], a: 1, d: "easy", e: "Advisor's five pillars: reliability, security, performance, cost, operational excellence. Cost recs include right-sizing and buying reservations." },

  // MEDIUM
  { q: "A dev VM is used 8 hours per day. To minimize cost:", o: ["Stop-deallocate the VM outside business hours", "Delete the VM every evening and redeploy each morning", "Leave it running for consistent availability", "Switch to a P1 premium tier", "Downgrade to the smallest available SKU permanently"], a: 0, d: "medium", e: "Stop-deallocating pauses compute billing while retaining the disk — ready to resume in the morning." },
  { q: "A CFO asks for a 5-year financial comparison of moving your datacentre to Azure. Best tool?", o: ["Pricing Calculator", "Cost Management + Billing", "Azure Advisor", "TCO Calculator"], a: 3, d: "medium", e: "TCO Calculator compares the 5-year cost of on-prem vs Azure — exactly a CFO-oriented business case." },
  { q: "You want to spec out the monthly cost of a new 3-tier web app in Azure. Best tool?", o: ["TCO Calculator", "Cost Management + Billing", "Reserved Instance portal", "Azure Advisor cost pillar", "Azure Pricing Calculator"], a: 4, d: "medium", e: "Pricing Calculator estimates monthly Azure cost for a specific proposed workload." },
  { q: "You have a predictable, steady production workload for the next 3 years. Best savings option?", o: ["Spot VMs", "Reserved Instances for 3 years", "Pay-as-you-go pricing", "Dev/Test subscription rates"], a: 1, d: "medium", e: "Predictable, long-term workloads are the classic Reserved Instance use case." },
  { q: "A large batch processing job runs overnight and can restart if interrupted. Best cost option?", o: ["Spot VMs with checkpoint restart", "Reserved Instances for one year", "Standard pay-as-you-go rates", "Dev/Test subscription rates", "Azure Savings Plan hourly commitment"], a: 0, d: "medium", e: "Interruptible + checkpointable workloads are ideal for Spot VMs (up to 90% off, evictable)." },
  { q: "You want to track costs by department (Marketing, Finance, R&D). Best approach?", o: ["Create a separate subscription per department", "Move each department to a different Azure region", "Apply Department tags and filter Cost Analysis", "Buy separate reservations for each department"], a: 2, d: "medium", e: "Tags are Azure's canonical mechanism for cost allocation without splitting into many subscriptions." },
  { q: "A workload uses Windows Server VMs. You already own the Windows Server licences. Which saves money?", o: ["Standard VM pricing with Windows included", "Spot VMs only, no other choice", "Not possible to reuse existing licences", "Azure Hybrid Benefit for BYOL licensing"], a: 3, d: "medium", e: "Hybrid Benefit lets you apply existing on-prem Windows / SQL licences to Azure resources, saving on the licensing portion." },
  { q: "Which VM state incurs compute billing?", o: ["Stopped-deallocated via Portal or CLI", "Deleted from the subscription entirely", "Never billed in any Azure state", "Stopped from within the guest OS"], a: 3, d: "medium", e: "Stopping the OS keeps the VM allocated on a host — compute is still billed. Only Deallocation frees the host and stops compute billing." },
  { q: "You want to be alerted when your monthly spend reaches 80% of a target. Use:", o: ["Azure Firewall network alerts", "Azure Advisor recommendations", "Microsoft Sentinel analytics rules", "Azure Monitor metric alerts on resources", "Cost Management budget with alerts"], a: 4, d: "medium", e: "Budgets support percentage-based alert thresholds (50/75/90/100%) that notify via email or Action Group." },
  { q: "Which is TRUE about Savings Plans vs Reserved Instances?", o: ["They are effectively the same product", "Savings Plans are more flexible, RIs discount deeper", "Reserved Instances are more flexible than Savings Plans", "Savings Plans are for dev/test workloads only"], a: 1, d: "medium", e: "Savings Plans: commit to $X/hour, applied broadly. RIs: commit to specific SKU/region. RIs deeper discount, Savings Plans more flexible." },
  { q: "You want to automate cost reports delivered to a storage account for BI tools. Use:", o: ["Cost Management scheduled storage exports", "Azure Firewall diagnostic logging", "Azure Advisor recommendation exports", "Reserved Instance usage dashboard", "Manual monthly CSV download from Portal"], a: 0, d: "medium", e: "Cost Management supports scheduled exports of usage data to a storage account for reporting." },
  { q: "A resource's cost depends on region. Which is TRUE?", o: ["Every region charges the same for the same SKU", "Some regions are cheaper than others for the same SKU", "Only Azure Government is cheaper than other regions", "Only Azure Government is priced above others"], a: 1, d: "medium", e: "Region pricing varies. Moving a resource to a cheaper region (if latency/compliance allow) is a common cost optimisation." },
  { q: "Which is TRUE about Reserved Instances scope?", o: ["Only apply to virtual machine compute capacity", "Only apply to dev/test tier resources", "Cover VMs, SQL, Cosmos DB, Storage, and more", "Only available for on-premises workloads"], a: 2, d: "medium", e: "Reservations exist for many services beyond VMs — RI is a broad Azure discount mechanism." },
  { q: "Which is TRUE about Azure Advisor cost recommendations?", o: ["They cost money to view in the portal", "They automatically apply changes to resources", "They flag idle resources for right-sizing", "They only work in United States regions"], a: 2, d: "medium", e: "Advisor surfaces cost recommendations you can act on manually — right-size VMs, shut down idle ones, buy RIs, etc." },
  { q: "A VM running in West Europe is deallocated. You are billed for:", o: ["Both compute and attached managed disk", "Only the compute portion of the VM", "Nothing while the VM is deallocated", "Only the attached managed disk"], a: 3, d: "medium", e: "Deallocation stops compute billing. Managed disks (storage) continue to bill." },
  { q: "You want to prevent development teams from deploying VMs larger than a certain SKU (cost control). Best tool?", o: ["Azure Policy 'Allowed VM SKUs' definition", "Cost Management budget alerts alone", "Delete their subscription entirely", "Assign Reader RBAC role only", "Azure Blueprint with locked resources"], a: 0, d: "medium", e: "Azure Policy can enforce allowed VM SKUs, preventing expensive VMs from being created. Budgets alert but don't block deployment." },
  { q: "Which is FALSE about tags in Azure?", o: ["Tags auto-inherit from the resource group", "Up to 50 tags are allowed per resource", "Tag keys are treated as case-insensitive", "Tags can be enforced through Azure Policy"], a: 0, d: "medium", e: "Tags are NOT automatically inherited by default. Policy can enforce inheritance (via 'append' or 'modify' effects)." },
  { q: "Which type of Azure subscription is BEST for a large enterprise with negotiated pricing and multiple departments?", o: ["Standard pay-as-you-go subscription", "Enterprise Agreement (EA) subscription", "Microsoft-sponsored free trial", "Dev/Test Visual Studio subscription", "Cloud Solution Provider (CSP) subscription"], a: 1, d: "medium", e: "EA subscriptions are for large enterprises with negotiated committed spend, department-level cost management, and prepaid credits." },
  { q: "You've bought a Reserved Instance for a specific region and VM family, but your workload is now in a different region. Which is TRUE?", o: ["The reservation is forfeited with no refund", "It converts automatically to the new region", "You can exchange the RI for a different one", "You must delete the reservation manually"], a: 2, d: "medium", e: "Reservations can be exchanged or refunded (with limits). Savings Plans are more flexible from the start." },
  { q: "You need to prevent 'bill shock' while learning Azure. What's the safest first action?", o: ["Delete all Azure subscriptions immediately", "Disable Cost Management entirely", "Buy a 3-year Reserved Instance upfront", "Set a small monthly budget with email alerts"], a: 3, d: "medium", e: "A small budget with alerts (e.g. $5/month) is a low-friction way to be notified if usage grows unexpectedly." },
  { q: "Reserving Cosmos DB throughput (RUs) is which type of Azure reservation?", o: ["Reserved Instance for compute", "Reserved Capacity for throughput", "Software Plan for OS licences", "Savings Plan hourly commitment"], a: 1, d: "medium", e: "Reserved Capacity covers throughput-style commitments — Storage, SQL DB vCores, Cosmos DB RUs, Databricks DBUs. Reserved Instances = compute (VMs); Software Plans = OS subscriptions." },
  { q: "Azure Hybrid Benefit for SQL covers which of these workloads?", o: ["Only Azure SQL Database as a service", "The full SQL portfolio, VMs, and SSIS", "Only SQL Database plus Managed Instance", "Only on-premises SQL Server installations"], a: 1, d: "medium", e: "SQL Hybrid Benefit covers the whole SQL portfolio: PaaS SQL DB, Managed Instance, SQL Server on Azure VMs, and Data Factory SSIS. Not just PaaS SQL." },

  // HARD
  { q: "Which is TRUE about the interaction of Reserved Instances + Hybrid Benefit?", o: ["They stack, reaching around 85% savings", "They cannot be combined on the same VM", "Hybrid Benefit replaces RIs entirely", "RIs completely replace Hybrid Benefit"], a: 0, d: "hard", e: "Reservations + Hybrid Benefit stack. Combined savings can reach ~85% on eligible Windows / SQL workloads." },
  { q: "A budget in Cost Management fires at 100%. What happens by default?", o: ["New resource deployments stop automatically", "The subscription is disabled until reset", "Notifications fire; deployments continue", "All resources are deleted at 100%", "Existing resources are throttled to lower SKUs"], a: 2, d: "hard", e: "Budgets alert but don't block. If you want a hard cap, wire the budget's Action Group to a runbook/Function that disables deployment." },
  { q: "Which is TRUE about Pricing Calculator estimates?", o: ["They are exact, invoice-accurate final numbers", "Estimates on list prices; actuals may differ", "They cover virtual machine estimates only", "They require Cost Management RBAC to open"], a: 1, d: "hard", e: "Pricing Calculator uses public list prices. Actual bills reflect your usage, negotiated rates, RIs, and Hybrid Benefit — often lower." },
  { q: "A VM is in Standard_D8s_v3 for 24/7 production. Which sequence is likely to save the most?", o: ["Apply Hybrid Benefit alone with no reservation", "Deallocate the VM every night to save", "Switch entirely to Spot VM pricing", "Combine 3-year RI with Hybrid Benefit", "Buy a 1-year Savings Plan and stop there"], a: 3, d: "hard", e: "For 24/7 production workloads, stacking 3-year RI + Hybrid Benefit is the deepest predictable discount. Spot risks eviction. Deallocation contradicts 24/7." },
  { q: "Which of these is TRUE about Azure's free-tier services?", o: ["Every Azure service is free indefinitely", "$200 credit, 12 months free services", "Only virtual machines free for 12 months", "Free tier is only offered in the United States"], a: 1, d: "hard", e: "Free account: $200 credit (30 days), 12 months of specific popular services free with limits, and some always-free services." },
  { q: "Which is a valid reason cross-region egress costs more than internet egress in some cases?", o: ["It doesn't — internet egress always costs more", "There is no cross-region egress charge at all", "Uses Microsoft backbone at a higher per-GB rate", "Only virtual machine traffic pays egress fees"], a: 2, d: "hard", e: "Egress pricing depends on paths and destinations. Cross-region often has higher per-GB rates than internet in some regions — check the pricing sheet for specifics." },
  { q: "You have a VMSS with autoscale. Best cost-monitoring approach?", o: ["Check the invoice manually each month", "RG-scoped budget with 50/80/100% alerts", "Delete the entire VMSS every night", "Ignore costs since autoscale is optimal", "Turn off autoscale to make costs predictable"], a: 1, d: "hard", e: "Budgets can be scoped to RGs, subscriptions, or MGs — the tightest useful scope is best for early warning." },
  { q: "Which is TRUE about buying a Reserved Instance?", o: ["Applies retroactively to past billed usage", "Locks in all workloads across the tenant", "Requires a fixed 3-year commitment always", "Applies going forward to matching resources"], a: 3, d: "hard", e: "RIs apply to matching running resources going forward. Past usage isn't refunded. Terms are 1 or 3 years." },
  { q: "Which subscription type is best for INTERNAL training with dev/test workloads?", o: ["Dev/Test subscription with Visual Studio", "Enterprise Agreement subscription", "Standard pay-as-you-go for production", "Microsoft-sponsored subscription only"], a: 0, d: "hard", e: "Dev/Test subs offer reduced rates for non-production — but require a Visual Studio subscription and can't legally run production workloads." },
  { q: "Which is TRUE about the cost model for Azure Functions on the Consumption plan?", o: ["A fixed monthly subscription fee", "Pay only for underlying storage used", "Completely free of any billing", "A flat per-second compute charge only", "Per-execution and GB-seconds usage"], a: 4, d: "hard", e: "Consumption plan bills for executions + GB-seconds (memory × duration). Includes a generous free monthly grant." },
  { q: "You've forgotten a set of test resources in an RG. Best way to see if they're costing you money?", o: ["Wait for the next monthly invoice", "Delete random resources until costs drop", "Cost Analysis filtered by RG for daily spend", "Only check Azure Advisor recommendations"], a: 2, d: "hard", e: "Cost Analysis (filter by RG or tag) shows daily/monthly spend broken down by service — the fastest way to spot forgotten resources." },
  { q: "Which is TRUE about the tag-based cost allocation strategy for a large org?", o: ["Not possible within a single Azure tenant", "Consistent tags enforced by Policy plus exports", "Only viable under an Enterprise Agreement", "Requires no upfront planning to succeed", "Only works if each department has its own tenant"], a: 1, d: "hard", e: "Tag-driven chargeback needs discipline: consistent taxonomy, Policy-enforced tags at deploy, and periodic exports. Well worth it at scale." },
  { q: "You have an existing RHEL subscription and want to attach it to Azure VMs to save cost. Which reservation type is this?", o: ["Software Plan for OS subscriptions", "Reserved Capacity for throughput", "Reserved Instance for compute", "Spot VM eviction-based pricing"], a: 0, d: "hard", e: "Software Plans cover OS subscriptions like RHEL, SUSE, and Windows Server. Reserved Instances cover compute capacity, not the OS licence." }
];
</script>
<script src="quiz.js"></script>
</body>
</html>

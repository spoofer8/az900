<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3.4 Monitoring tools · AZ-900 quiz</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 3 · Management and governance</span></div>
    <h1 class="q-title">Monitoring tools</h1>
    <p class="q-subtitle">Azure Advisor, Service Health, Azure Monitor, Log Analytics, Application Insights.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
      <div class="feedback" id="feedback"><div class="feedback-verdict" id="feedback-verdict"></div><div class="feedback-explanation" id="feedback-explanation"></div></div>
      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>
  </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>
    </div>
    <h2 class="review-title">Review</h2>
    <div id="review"></div>
  </div>

</div>

<script>
window.QUIZ_META = { title: "Monitoring tools", code: "3.4", domain: "Domain 3" };

window.QUIZ_QUESTIONS = [
  // EASY
  { q: "Azure Advisor provides:", o: ["Personalised best-practice recommendations", "Cost invoicing across subscriptions", "Physical datacentre security controls", "Layer-7 load balancing for web apps"], a: 0, d: "easy", e: "Advisor analyses your resources and surfaces recommendations across five pillars." },
  { q: "How many pillars does Azure Advisor cover?", o: ["3", "4", "5", "7"], a: 2, d: "easy", e: "Advisor covers 5 pillars: reliability, security, performance, cost, and operational excellence." },
  { q: "Which is NOT an Advisor pillar?", o: ["Compliance", "Reliability", "Security", "Performance"], a: 0, d: "easy", e: "Advisor pillars: reliability, security, performance, cost, operational excellence. Compliance is a governance concern (Purview/Policy)." },
  { q: "Azure Service Health shows:", o: ["Health status of one individual resource", "Cost analysis broken down by resource", "RBAC role assignments across the tenant", "Azure incidents affecting your subscriptions"], a: 3, d: "easy", e: "Service Health is filtered to your subscriptions, showing Azure's own incidents and communications." },
  { q: "How many content categories does Azure Service Health provide?", o: ["2", "3", "4", "10"], a: 2, d: "easy", e: "Four: Service issues, Planned maintenance, Health advisories, Security advisories." },
  { q: "Azure Resource Health shows:", o: ["All Azure incidents globally across regions", "Current health of a specific resource you own", "Health limited to Storage accounts only", "Health limited to PaaS services only"], a: 1, d: "easy", e: "Resource Health tells you the current status of one specific resource — 'Is my VM up right now?'" },
  { q: "Azure Status is:", o: ["A personal dashboard scoped to your subscriptions", "A billing tool for consumption reports", "The public global page showing Azure health", "A security scanner for public endpoints"], a: 2, d: "easy", e: "Azure Status is the unfiltered public dashboard — visible to everyone, not scoped to your account." },
  { q: "Azure Monitor is:", o: ["A dedicated product for VM CPU metrics only", "A CDN for delivering static assets globally", "A backup service for VM disks and files", "The umbrella observability service in Azure"], a: 3, d: "easy", e: "Azure Monitor is the top-level observability stack. Everything monitoring-related in Azure lives under it." },
  { q: "In Azure Monitor, 'Metrics' are:", o: ["Free-text log entries stored for keyword search", "Time-series numerical values at short intervals", "Resource configuration settings and tag metadata", "The same telemetry as alerts and action groups"], a: 1, d: "easy", e: "Metrics = time-series numerical data, near-real-time, chartable in Metrics Explorer." },
  { q: "In Azure Monitor, 'Logs' are:", o: ["Records stored in a Log Analytics workspace", "Numerical values sampled every 60 seconds", "The same telemetry stream as metrics", "A CLI-only export of activity events"], a: 0, d: "easy", e: "Logs are richer records — activity, resource, guest OS, application, or custom events — stored in Log Analytics." },
  { q: "The query language for Log Analytics is:", o: ["Transact-SQL", "Kusto Query Language", "Python scripting", "PowerShell cmdlets"], a: 1, d: "easy", e: "KQL is Microsoft's Kusto query language — SQL-like syntax used across Log Analytics, Sentinel, and Defender for Cloud." },
  { q: "Which service is Azure's Application Performance Monitoring (APM) tool?", o: ["Azure Advisor", "Azure Cost Management", "Azure Firewall", "Application Insights"], a: 3, d: "easy", e: "Application Insights is Azure's APM — tracks requests, dependencies, exceptions, page views, and more for web / API apps." },
  { q: "In Azure Monitor, what fires when a condition is met (like CPU &gt; 90%)?", o: ["An alert rule that invokes its Action Group", "Automatic remediation runs across resources", "Nothing — conditions require manual review", "Only an email to the subscription owner"], a: 0, d: "easy", e: "Alerts are triggered by conditions on metrics/logs/activity. Action Groups are attached to alerts and define what happens." },
  { q: "An Action Group in Azure Monitor can do which of the following?", o: ["Only send email to the subscription owner", "Only trigger Automation Account Runbooks", "Only send SMS to registered on-call engineers", "Fan out to email, SMS, voice, webhook, and automation"], a: 3, d: "easy", e: "Action Groups are the multi-channel notification + automation engine for alerts." },
  { q: "Which service captures request telemetry, dependency calls, and exceptions for web apps?", o: ["Azure Advisor recommendations", "Application Insights", "Azure Firewall Premium", "Azure Bastion service"], a: 1, d: "easy", e: "Application Insights instruments applications to capture requests, dependencies, exceptions, page views, and more." },
  { q: "Which tool is used for network diagnostics and packet capture in Azure?", o: ["Azure Network Watcher", "Azure Advisor engine", "Azure Firewall Standard", "Azure Cost Management"], a: 0, d: "easy", e: "Network Watcher is Azure Monitor's networking-focused feature — connection troubleshooting, packet capture, topology diagrams." },
  { q: "Metric alerts fire at approximately:", o: ["Once per hour on average", "Weekly during maintenance windows", "Near-real-time (~1 minute latency)", "Only from a nightly batch job"], a: 2, d: "easy", e: "Metric-based alerts are close to real-time (roughly 1 min evaluation latency)." },
  { q: "Which of these is TRUE about Azure Monitor autoscale?", o: ["It is a completely separate paid service", "It only works with Azure Storage accounts", "It requires ExpressRoute connectivity to run", "A feature of Azure Monitor for metric scaling"], a: 3, d: "easy", e: "Autoscale rules use metric signals to scale VMSS, App Service Plans, and other services in and out." },
  { q: "Container Insights is used for monitoring:", o: ["Physical on-prem servers via WMI agents", "AKS clusters and container workloads", "Only Azure Storage account activity logs", "Only virtual network traffic flows"], a: 1, d: "easy", e: "Container Insights collects performance and health data from AKS clusters and container workloads." },
  { q: "VM Insights is used for monitoring:", o: ["Only OS boot events captured at startup", "Only blob and file storage activity streams", "Only App Service plans and deployment slots", "Guest OS metrics, processes, and dependencies"], a: 3, d: "easy", e: "VM Insights extends monitoring into the guest OS with performance metrics and dependency maps." },
  { q: "Azure Monitor Action Groups are triggered by:", o: ["Alerts firing based on rule conditions", "Manual clicks in the Azure portal only", "Only Service Health regional incidents", "Only Cost Management budget thresholds"], a: 0, d: "easy", e: "Action Groups are the response side of alerts. When an alert fires, its associated Action Group executes." },
  { q: "What does an 'alert rule' consist of?", o: ["A pricing tier assigned by subscription", "A specific region where it evaluates", "A resource, a condition, and an Action Group", "A single tag applied to the target resource"], a: 2, d: "easy", e: "Alert rules combine: the signal source (metric/log/activity), the condition, and the Action Group to invoke." },

  // MEDIUM
  { q: "You want a recommendation to right-size a VM based on utilisation. Best tool?", o: ["Azure Firewall", "Microsoft Purview", "Azure Bastion", "Azure Advisor", "Microsoft Sentinel"], a: 3, d: "medium", e: "Advisor's cost and performance recommendations include right-sizing VMs based on observed utilisation." },
  { q: "You want to check if Azure has an ongoing regional issue affecting your services. Best tool?", o: ["Cost Management billing views", "Azure Advisor recommendations", "Azure Service Health dashboard", "Resource Health for that resource"], a: 2, d: "medium", e: "Service Health surfaces Azure-side incidents filtered to your subscriptions and impacted services." },
  { q: "You suspect your specific VM is unavailable right now. Best diagnostic?", o: ["Resource Health for that VM", "Azure Advisor recommendations", "Azure Service Health incidents", "Azure Status public dashboard"], a: 0, d: "medium", e: "Resource Health tells you the up-to-the-minute status of your individual resource." },
  { q: "You want a chart of your VM's CPU % over the last 24 hours. Best tool?", o: ["Metrics Explorer in Azure Monitor", "Azure Advisor recommendations panel", "Cost Management analysis view", "Log Analytics workspace only", "Azure Service Health dashboard"], a: 0, d: "medium", e: "Metrics Explorer charts near-real-time numerical metrics — the fastest tool for time-series data." },
  { q: "You want to search 7 days of firewall logs for a specific source IP across multiple resources. Best tool?", o: ["Log Analytics with a KQL query", "Metrics Explorer time-series charts", "Azure Advisor recommendations engine", "Azure Service Health event log", "Microsoft Purview data catalog"], a: 0, d: "medium", e: "Log Analytics with KQL is the tool for searching, filtering, and joining logs across resources." },
  { q: "You want failed-request telemetry for your web app, with distributed tracing to downstream services. Best tool?", o: ["Azure Advisor recommendations", "Azure Firewall diagnostic logs", "Cost Management analysis views", "Application Insights instrumentation"], a: 3, d: "medium", e: "Application Insights captures request telemetry, dependency traces, and exceptions with correlation IDs — designed for APM." },
  { q: "You want to notify a team on Teams whenever a critical alert fires. Best approach?", o: ["Alert rule with webhook or Logic App action", "Manual monitoring by the on-call team", "Alerts limited to email notifications", "Alerts limited to SMS notifications"], a: 0, d: "medium", e: "Action Groups can trigger webhooks or Logic Apps, which integrate cleanly with Teams for chat notifications." },
  { q: "You want VMSS to scale out when average CPU &gt; 70% for 5 minutes. Best feature?", o: ["Azure Advisor recommendations", "Manual watching of the portal", "Azure Monitor autoscale rule", "Microsoft Sentinel playbook"], a: 2, d: "medium", e: "Azure Monitor autoscale evaluates metric signals against thresholds and issues scale actions to VMSS, App Service, etc." },
  { q: "Which of these represents the CORRECT alert flow?", o: ["Advisor → Cost Management → Billing", "Firewall → Storage → Log Analytics", "Portal → Bicep → Deployment", "Cost budget → Alert → Firewall rule", "Signal → Alert rule → Action Group"], a: 4, d: "medium", e: "The pipeline is Signal (metric/log/activity) → Alert rule condition met → Action Group runs its actions." },
  { q: "Which is TRUE about the difference between Service Health and Azure Status?", o: ["Both are identical products in Azure", "Service Health is global; Azure Status is subscription-scoped", "Service Health: your subs; Azure Status: global public", "Only Service Health is available in the free tier"], a: 2, d: "medium", e: "Service Health = personal / subscription-scoped. Azure Status = public global page." },
  { q: "You want to receive an alert when a subscription-level Azure event happens (e.g. a Resource Group is deleted). Best signal source?", o: ["Metric alert on subscription-level CPU usage", "Activity log alert on subscription events", "Application Insights request telemetry", "Firewall diagnostic log-based alert rule"], a: 1, d: "medium", e: "Activity log alerts fire on management operations at the subscription level — RG deletion, role assignment, policy assignment, etc." },
  { q: "You want to detect unusual increases in request failure rate with automatic anomaly detection. Best fit?", o: ["Manually reviewed dashboards", "Cost Management budget alerts", "Azure Firewall Premium IDPS", "Application Insights smart detection", "Advisor performance recommendations"], a: 3, d: "medium", e: "App Insights includes 'smart detection' — AI-driven anomaly detection for failures, performance, and resource issues." },
  { q: "Which of these is TRUE about Azure Advisor recommendations?", o: ["They apply themselves automatically on save", "They are surfaced for you to review and apply", "They only cover VMs and disks", "They require a paid enterprise agreement"], a: 1, d: "medium", e: "Advisor recommends, you decide. Some recommendations link into automated remediation (like Defender for Cloud auto-fix)." },
  { q: "You want to be alerted if planned Azure maintenance will affect your VMs. Best feature?", o: ["Service Health alert for planned maintenance", "Metric alert on VM CPU utilisation levels", "Application Insights failed-request alert", "Cost Management budget breach alert"], a: 0, d: "medium", e: "Service Health supports alerts scoped to specific event types (issues, planned maintenance, advisories) — configurable in Action Groups." },
  { q: "Which is TRUE about the Log Analytics workspace?", o: ["It stores only metric time-series data", "It is identical to Application Insights", "Central log store queryable through KQL syntax", "It supports only on-premises servers"], a: 2, d: "medium", e: "Log Analytics workspaces are the central log store. App Insights, Sentinel, and Defender for Cloud all use workspaces underneath." },
  { q: "Which of these is a valid data source for Azure Monitor Logs?", o: ["Only Azure virtual machine agents", "Platform, guest OS, apps, and custom sources", "Only Azure App Service diagnostic logs", "Only Azure Storage account activity"], a: 1, d: "medium", e: "Monitor Logs ingests from platform, guest OS, applications, and custom sources — a broad range." },
  { q: "Which is TRUE about the difference between Application Insights and Log Analytics?", o: ["They are entirely unrelated services", "Log Analytics only handles VM performance logs", "Application Insights has been deprecated", "App Insights is APM; Log Analytics is the log store"], a: 3, d: "medium", e: "App Insights = APM data model. Log Analytics = the underlying workspace store. App Insights is now workspace-based." },
  { q: "You want to notify an on-call engineer via SMS AND email when a critical alert fires. Best fit?", o: ["Two separate parallel alert rules", "One rule; Action Group with both actions", "Only email is supported by Azure Monitor", "Only SMS is supported by Azure Monitor"], a: 1, d: "medium", e: "Action Groups support multiple actions (email, SMS, voice, webhook, Function, Logic App, Runbook) in one group." },
  { q: "Which is FALSE about Azure Monitor?", o: ["It provides metrics", "It provides logs", "It provides alerts and autoscale", "It provides billing"], a: 3, d: "medium", e: "Billing lives under Cost Management + Billing. Monitor is metrics / logs / alerts / autoscale / App Insights / etc." },
  { q: "Which is TRUE about the Azure Advisor category 'operational excellence'?", o: ["It is not a recognised Advisor pillar", "Covers tagging and monitoring configuration", "It covers only cost-focused recommendations", "It covers only virtual machine resources"], a: 1, d: "medium", e: "Operational excellence includes tagging, resource organisation, monitoring configuration, and best practices for reliable operations." },
  { q: "Which is TRUE about alert severity in Azure Monitor?", o: ["All alerts share a single severity level", "Severity is not supported in Azure Monitor", "Only Sev 0 Critical exists in Monitor", "Severity is a paid Sentinel-only feature", "Alerts have severities Sev 0 through Sev 4"], a: 4, d: "medium", e: "Alerts have 5 severity levels (Sev 0-4). Route them through Action Groups accordingly — page for Sev 0, email for Sev 3, etc." },
  { q: "Which is TRUE about Azure Monitor's cost model?", o: ["Fully free with unlimited retention", "Only Metrics ingestion is billed", "Log ingestion and retention billed per GB", "Only Alerts fired trigger charges"], a: 2, d: "medium", e: "Metrics are usually free for basic use; logs are billed by ingestion and retention (per GB). Retention beyond default period costs more." },

  // HARD
  { q: "Which of these best describes when to use Metrics vs Logs?", o: ["Metrics: time-series numbers; Logs: KQL text", "They are identical — pick either one", "Metrics work only for virtual machines", "Logs are always the cheaper option"], a: 0, d: "hard", e: "Rule of thumb: metrics for known numerical dimensions and dashboards; logs for ad-hoc investigation, correlation, and structured events." },
  { q: "Which is TRUE about the retention of Log Analytics data?", o: ["Data is retained forever at no charge", "Default is 30 days; longer retention costs extra", "Only 7 days of retention are ever possible", "There is no retention — logs are discarded"], a: 1, d: "hard", e: "Default retention (free) is around 30 days. Extending to 30/90/730 days incurs per-GB retention charges." },
  { q: "Which of these BEST captures the boundary between Service Health and Resource Health?", o: ["They are effectively the same view", "Service Health is for VMs; Resource Health for storage", "Service Health is paid, Resource Health is free", "Service Health: Azure incidents; Resource Health: yours", "Service Health tracks cost; Resource Health tracks tags"], a: 3, d: "hard", e: "Service Health = the provider's incidents. Resource Health = your resources' current state. Together they answer 'why is my thing down?'" },
  { q: "Which of these is a valid use of KQL in Log Analytics?", o: ["Provisioning new VMs in a subscription", "Aggregating and joining log records across resources", "Deleting resources permanently across a region", "Sending SMS to registered on-call engineers"], a: 1, d: "hard", e: "KQL is a query language — read/aggregate/join/summarise log data. It doesn't provision or modify resources." },
  { q: "Which is TRUE about Azure Advisor and Defender for Cloud?", o: ["Both are the same product with different names", "Only Azure Advisor covers security concerns", "Advisor replaces Defender for Cloud entirely", "Defender replaces Advisor for all security topics", "Complementary — Advisor Security links to Defender"], a: 4, d: "hard", e: "Advisor's Security pillar surfaces high-level items; Defender for Cloud provides the deeper CSPM + workload protection engine with Secure Score." },
  { q: "You need to alert on 'CPU &gt; 90% for 5 min' AND 'memory &gt; 80% for 5 min' simultaneously. Best approach?", o: ["Multi-condition alert combining both signals", "Only one metric signal per alert rule", "Impossible in Azure Monitor today", "Only via Sentinel scheduled analytics"], a: 0, d: "hard", e: "Metric alerts support multi-signal conditions in one rule, so you can require multiple metrics to breach before firing." },
  { q: "Which is TRUE about Application Insights instrumentation?", o: ["It works only with .NET applications", "Requires manual setup for every request handler", "It replaces the Log Analytics workspace", "SDKs for .NET, Java, Node, Python, JS + codeless"], a: 3, d: "hard", e: "App Insights has SDKs for major languages. For App Service and Functions, codeless instrumentation is often possible." },
  { q: "Which is TRUE about Azure Monitor autoscale rules?", o: ["Only threshold-based rules are supported", "Only time-based schedules are supported", "Both threshold rules and schedule triggers work", "Autoscale is a Sentinel-only paid feature", "Autoscale requires ExpressRoute connectivity"], a: 2, d: "hard", e: "Autoscale can react to metrics OR run on schedules (e.g. scale out at 09:00 weekdays, scale in at 18:00)." },
  { q: "You have a globally distributed application. Which Azure Monitor feature helps identify slow dependency calls across services?", o: ["Metrics Explorer time-series charts only", "App Insights end-to-end dependency tracking", "Microsoft Sentinel hunting queries only", "Cost Management cost analysis views"], a: 1, d: "hard", e: "App Insights correlates requests across services and captures dependency call duration and failure rate — the go-to for distributed diagnostics." },
  { q: "Which is TRUE about smart-detection features in Azure Monitor?", o: ["It requires manual anomaly configuration", "It is available only for virtual machines", "It fully replaces traditional alert rules", "It works only when Sentinel is enabled", "Auto anomaly detection on metrics and App Insights"], a: 4, d: "hard", e: "Smart Detection uses machine learning to surface anomalies that fixed thresholds might miss." },
  { q: "Which is TRUE about the relationship between Sentinel and Log Analytics?", o: ["They are entirely unrelated services", "Sentinel replaces Log Analytics completely", "Only Sentinel can execute KQL queries", "Sentinel is built on a Log Analytics workspace"], a: 3, d: "hard", e: "Sentinel runs on a Log Analytics workspace. Data ingested for Sentinel is queried with KQL like any other Monitor log data." },
  { q: "Which is TRUE about Advisor's actionability?", o: ["Recommendations are strictly informational", "Advisor auto-applies changes on save", "Recommendations often link directly to the fix", "Recommendations require Sentinel to view", "Recommendations need an enterprise agreement"], a: 2, d: "hard", e: "Many Advisor recommendations link directly to the fix — right-size, buy RI, apply setting. You still decide when to click." }
];
</script>
<script src="quiz.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3.3 Deployment &amp; management tools · AZ-900 quiz</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 3 · Management and governance</span></div>
    <h1 class="q-title">Deployment &amp; management tools</h1>
    <p class="q-subtitle">Portal, CLI, PowerShell, Cloud Shell, ARM templates, Bicep, Azure Arc.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
      <div class="feedback" id="feedback"><div class="feedback-verdict" id="feedback-verdict"></div><div class="feedback-explanation" id="feedback-explanation"></div></div>
      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>
  </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>
    </div>
    <h2 class="review-title">Review</h2>
    <div id="review"></div>
  </div>

</div>

<script>
window.QUIZ_META = { title: "Deployment & management tools", code: "3.3", domain: "Domain 3" };

window.QUIZ_QUESTIONS = [
  // EASY
  { q: "What is the Azure Portal?", o: ["Web-based GUI for managing Azure resources", "A cross-platform command-line automation tool", "A monitoring and observability service", "A tool for migrating on-prem workloads to Azure"], a: 0, d: "easy", e: "Azure Portal is Microsoft's web GUI for Azure. Discoverable, visual, good for exploration and one-off tasks." },
  { q: "Azure CLI is:", o: ["A GUI for browser-based Azure admin", "A Windows-only PowerShell module", "Cross-platform CLI using 'az' commands", "A monitoring service for Azure resources"], a: 2, d: "easy", e: "Azure CLI is cross-platform. Command style: 'az &lt;group&gt; &lt;subcommand&gt;' (e.g. 'az vm create')." },
  { q: "Azure PowerShell uses which command style?", o: ["Lowercase 'az' verb-noun commands", "SQL-style statements over an ODBC layer", "REST-only calls with JSON payloads", "Verb-Noun cmdlets like New-AzResourceGroup"], a: 3, d: "easy", e: "Azure PowerShell uses PowerShell's Verb-Noun cmdlet convention." },
  { q: "Cloud Shell is:", o: ["Browser-hosted terminal pre-authenticated for Azure", "A managed monitoring product for cloud workloads", "An automated backup service for VM disks", "A managed layer-7 load balancer for web apps"], a: 0, d: "easy", e: "Cloud Shell lets you run CLI/PowerShell in the browser (shell.azure.com) without local install. Includes az, git, docker, kubectl, terraform." },
  { q: "Cloud Shell supports which shell environments?", o: ["Only Bash with Azure CLI installed", "Only PowerShell with the Az module", "Only classic Windows DOS commands", "Both Bash and PowerShell environments"], a: 3, d: "easy", e: "Cloud Shell offers both Bash (with Azure CLI + Linux tools) and PowerShell (with Az module + PS tools)." },
  { q: "Cloud Shell persists your home directory using:", o: ["Browser local storage in the session", "Blob storage attached to the browser only", "A small Azure Storage account created on first use", "In-memory storage that resets each session"], a: 2, d: "easy", e: "Cloud Shell needs an Azure Storage account (auto-created if needed) to persist $HOME across sessions." },
  { q: "ARM templates are written in:", o: ["YAML markup files", "Python SDK scripts", "PowerShell DSC files", "JSON declarative files"], a: 3, d: "easy", e: "ARM templates are JSON declarative documents that describe desired Azure infrastructure." },
  { q: "Bicep is:", o: ["A managed monitoring product for Azure workloads", "A DSL for Azure IaC that transpiles to ARM JSON", "A layer-7 load balancer for HTTP workloads", "An IaC tool limited to VM deployments"], a: 1, d: "easy", e: "Bicep is Microsoft's cleaner DSL for Azure IaC. It transpiles to ARM JSON but is far more concise and readable." },
  { q: "Which is TRUE about ARM templates and Bicep?", o: ["They are entirely different engines with no overlap", "Bicep has been deprecated in favour of Terraform", "They share the ARM engine; Bicep is syntactic sugar", "ARM templates only work in US commercial regions"], a: 2, d: "easy", e: "Bicep transpiles to ARM JSON — same engine, same behaviour, cleaner syntax." },
  { q: "'Idempotent' in IaC means:", o: ["The template can only be executed one single time", "The template is designed to delete existing resources", "The template can only be applied to virtual machines", "Re-applying the template produces the same end state"], a: 3, d: "easy", e: "Idempotent = repeatable with the same result. A key property of both ARM and Bicep deployments." },
  { q: "Azure Arc allows you to:", o: ["Extend Azure's control plane to non-Azure resources", "Provide automated backup for VM disks and databases", "Manage virtual machines only within Azure regions", "Improve regional networking across Azure boundaries"], a: 0, d: "easy", e: "Azure Arc lets you manage non-Azure resources (on-prem servers, AWS EC2, GCP VMs, K8s clusters) as if they were in Azure." },
  { q: "Which resources can Azure Arc manage?", o: ["Only resources hosted natively inside Azure regions today", "Only relational and NoSQL managed database instances", "Servers, Kubernetes clusters, and Azure data services anywhere", "Only Azure web app and function app workloads"], a: 2, d: "easy", e: "Arc extends Azure management to servers, K8s clusters, and Azure data services (SQL MI, PostgreSQL) running outside Azure." },
  { q: "The Azure Mobile app is used for:", o: ["Running production workloads on iOS and Android", "Mobile monitoring, alerts, and Cloud Shell access", "Managing subscription billing and cost dashboards", "Bulk storage account file transfer and sync"], a: 1, d: "easy", e: "The mobile app is for on-the-go admin — check resource status, respond to alerts, run quick Cloud Shell commands." },
  { q: "Every Azure management call ultimately goes through:", o: ["The Azure Resource Manager (ARM) control plane", "The Azure Mobile app's admin request pipeline", "The Azure Portal web front-end only", "The Windows Task Scheduler runtime service"], a: 0, d: "easy", e: "ARM is the single control plane. Portal, CLI, PowerShell, REST, SDKs — all end at ARM." },
  { q: "Which is CROSS-PLATFORM?", o: ["Only Azure PowerShell is cross-platform capable", "Only Azure CLI is cross-platform capable", "Neither tool runs outside of Windows", "Both Azure CLI and Azure PowerShell (PS Core)"], a: 3, d: "easy", e: "Both are cross-platform. Azure CLI is bash-friendly; Azure PowerShell runs on PS Core on Linux/macOS/Windows." },
  { q: "Which is FREE to use in Cloud Shell?", o: ["Nothing is free; a storage account is always required at cost", "Compute and CLI are free; only the tiny storage account costs", "All Cloud Shell usage is billed at premium compute rates", "Cloud Shell is only free in Azure Government cloud regions"], a: 1, d: "easy", e: "Cloud Shell compute is free — you only pay for the tiny storage account that persists your $HOME." },
  { q: "Which tool is BEST for a first-time Azure user exploring services visually?", o: ["Azure CLI with 'az' commands", "Azure Portal at portal.azure.com", "Bicep declarative templates", "The Azure REST API directly"], a: 1, d: "easy", e: "Portal is designed for discoverability and visual navigation — best for learning and one-off admin." },
  { q: "Which tool is BEST for scripted automation of Azure resource management?", o: ["Azure CLI or Azure PowerShell scripts", "Azure Portal wizards through the browser", "The Azure Mobile app on iOS or Android", "Direct REST API calls with curl only"], a: 0, d: "easy", e: "CLI/PowerShell are the standard scripting interfaces. Portal is not suited for automation." },
  { q: "Which is Microsoft's recommended IaC for NEW Azure projects?", o: ["ARM templates written in raw JSON", "Manual portal-based deployments", "Bicep declarative IaC language", "Terraform as Microsoft's default"], a: 2, d: "easy", e: "For new Azure-native projects, Microsoft recommends Bicep — cleaner and more concise than ARM JSON. (Terraform is fully supported but not Microsoft's default.)" },
  { q: "Which is TRUE about Azure Arc pricing?", o: ["It's billed at a premium per-resource per-hour rate", "Core Arc onboarding is free; add-on Azure services cost extra", "Only Enterprise Agreement customers may enable it", "Arc is still in preview and unavailable for GA use"], a: 1, d: "easy", e: "Onboarding a server or K8s cluster to Arc is free. Optional Azure services applied via Arc (Policy, Defender for Cloud plans, Monitor) have their own charges." },

  // MEDIUM
  { q: "You want to write a reusable, version-controlled deployment for a 3-tier web app across dev / test / prod. Best approach?", o: ["Screenshot-driven portal deployments per environment", "Ad-hoc PowerShell scripts stored on a shared drive", "Bash scripts committed only to a personal machine", "Manual portal clicks with a written runbook per env", "IaC (Bicep or ARM templates) checked into Git"], a: 4, d: "medium", e: "IaC + version control = reproducible, reviewable, rollback-able deployments." },
  { q: "You want to run a quick 'az vm list' from any device without installing anything. Best fit?", o: ["Install the CLI on every device you might use", "Use the Azure Mobile app for all admin work", "Call the ARM REST API directly via curl", "Cloud Shell running in a browser session", "Set up a GitHub Codespace with the CLI baked in"], a: 3, d: "medium", e: "Cloud Shell is the zero-install option — open a browser, sign in, run commands." },
  { q: "You need to manage on-prem Windows servers with Azure Policy, RBAC, and Defender for Cloud. Best fit?", o: ["Onboard the on-prem servers into Azure Arc", "Manage them only via the Azure Portal manually", "Migrate all workloads to Azure IaaS VMs first", "There is no supported way to do this today"], a: 0, d: "medium", e: "Azure Arc extends Azure Policy, RBAC, and Defender coverage to on-prem servers. No migration required." },
  { q: "Which is TRUE about ARM templates vs Bicep in terms of features?", o: ["Bicep has fewer capabilities than raw ARM JSON", "Equivalent capability; Bicep is preferred for readability", "ARM has more capabilities than Bicep can express", "Bicep only supports Azure Storage resources"], a: 1, d: "medium", e: "Bicep transpiles to ARM, so anything you can deploy with ARM you can deploy with Bicep. Bicep just does it more cleanly." },
  { q: "You need to reset a colleague's password from your phone quickly. Best fit?", o: ["Azure CLI via a mobile SSH terminal", "The Portal on a colleague's laptop nearby", "The Azure Mobile app on your phone", "Not currently possible from a mobile device"], a: 2, d: "medium", e: "The Azure mobile app supports common admin tasks including user management, alerts, and Cloud Shell." },
  { q: "You want to enforce that all future deployments use Bicep, not portal clicks. Best approach?", o: ["Block the Azure Portal by using restrictive NSG rules", "Delete the Azure Portal endpoint from the tenant setup", "Restrict access to PowerShell scripting only via RBAC", "Process/PR-gate controls; Policy can't enforce tool choice"], a: 3, d: "medium", e: "Policy governs *what* gets deployed, not *how*. Enforcing tool choice is a process/culture matter (code review, PR gates)." },
  { q: "Which is TRUE about Azure Arc-enabled Kubernetes?", o: ["Only Azure Kubernetes Service (AKS) clusters are supported", "Only Windows-based Kubernetes clusters are supported", "Only fully managed Kubernetes services in Azure are supported", "Only clusters running on Azure Stack HCI are supported", "Any CNCF-conformant K8s cluster (EKS, GKE, OpenShift) can enroll"], a: 4, d: "medium", e: "Arc-enabled K8s supports any CNCF-conformant cluster. Once enrolled, you can apply Azure Policy, GitOps configs, and Monitor." },
  { q: "In Cloud Shell, which tools are pre-installed?", o: ["Only the 'az' CLI without any other tools", "Only an SSH client for remote access", "az, PowerShell, git, docker, kubectl, terraform, and editors", "No pre-installed tools; you install everything on first use"], a: 2, d: "medium", e: "Cloud Shell is a full DevOps toolbox: CLI, PS, git, docker, kubectl, helm, terraform, vim, nano, and even VS Code." },
  { q: "Which format is ARM templates in?", o: ["YAML with anchor references", "Python scripting language", "TOML configuration format", "JSON declarative documents"], a: 3, d: "medium", e: "ARM templates are JSON. Bicep is a cleaner DSL that transpiles to ARM JSON." },
  { q: "You need to enforce that non-Azure servers appear in Azure Policy reports. Best fit?", o: ["Onboard them to Azure Arc, then apply Policy at MG/Sub scope", "Migrate them fully into Azure IaaS before applying Policy", "Leave them out of scope and monitor them separately", "Connect only via site-to-site VPN and monitor manually", "Install a Log Analytics agent only, then export to CSV"], a: 0, d: "medium", e: "Arc-enabled servers appear as Azure resources and can be governed by Policy just like native Azure VMs." },
  { q: "You want to script an idempotent deployment that can be re-run without duplicating resources. Best approach?", o: ["Manual portal-based deployment repeated per env", "Declarative IaC via ARM template or Bicep (idempotent)", "Sequential shell commands with hardcoded resource names", "Imperative REST POST calls with hardcoded payloads"], a: 1, d: "medium", e: "Declarative IaC (ARM/Bicep) is idempotent by design — apply repeatedly, end state is identical." },
  { q: "Which is TRUE about Cloud Shell session limits?", o: ["Sessions run indefinitely with no idle timeout", "Sessions must be pre-scheduled through the Portal", "Sessions time out after ~20 min idle; storage persists", "Cloud Shell is only offered in Azure Government cloud"], a: 2, d: "medium", e: "Cloud Shell sessions time out after inactivity (~20 min). Your $HOME storage persists between sessions." },
  { q: "You want to modify an existing Azure resource via API from a custom script. Best approach?", o: ["Only the Azure Portal supports resource modifications", "Bicep template deployments only; no other option exists", "This is not possible outside of the Azure Portal UI", "Use the Azure REST API or an SDK (Python, .NET, Java, Go)"], a: 3, d: "medium", e: "REST APIs and SDKs are the raw ways to talk to ARM. CLI/PowerShell/IaC are convenient wrappers." },
  { q: "Which is TRUE about Azure PowerShell vs Azure CLI in terms of capability?", o: ["Azure CLI can do more than Azure PowerShell today", "They have equivalent capabilities — choose by preference", "Azure PowerShell can do more than Azure CLI today", "Neither can be used to create virtual machines"], a: 1, d: "medium", e: "Both wrappers hit the same ARM API. Feature parity is the goal; both can create VMs, storage, networks, etc." },
  { q: "You want to run an ARM template deployment from your local machine. Best tool?", o: ["Only the Azure Portal, by uploading the template file", "Azure CLI or Azure PowerShell against the local file", "Microsoft Excel via the Azure Data connector", "Not possible — templates only run inside the Portal"], a: 1, d: "medium", e: "CLI and PowerShell can deploy ARM/Bicep templates from local files. The Portal supports upload/paste, but scripting is more repeatable." },
  { q: "Which is TRUE about the Azure Mobile app?", o: ["Subset of Portal features + Cloud Shell for admin on the go", "It is a full replacement for the Portal on all platforms", "It is read-only and does not allow any admin changes", "It is targeted only at developers writing app code"], a: 0, d: "medium", e: "The mobile app is a portable admin tool — check resources, respond to alerts, run Cloud Shell commands." },
  { q: "Which is TRUE about ARM's role in Azure?", o: ["It is Azure's primary monitoring and alerting product", "It is only used for ARM template and Bicep deploys", "It is an on-premises Windows Server management role", "The unified control plane every management op passes through"], a: 3, d: "medium", e: "ARM = the single control plane. All interfaces (Portal, CLI, PS, REST, SDK, IaC) end at ARM." },
  { q: "You have 200 similar VMs across 5 regions. Best approach for consistent, versioned management?", o: ["Manual portal work with a written runbook", "PowerShell scripts stored locally, not in Git", "IaC (Bicep) + CI/CD pipelines + Policy enforcement", "Individual per-VM configuration on each region", "Bulk edit through a spreadsheet view in the Portal"], a: 2, d: "medium", e: "At scale, IaC + CI/CD + Policy is the only sustainable approach for consistent, auditable configuration." },
  { q: "Which is TRUE about Bicep modules?", o: ["Bicep does not support any form of modularisation", "Bicep supports modules for reusable sub-templates and composition", "Bicep modules are limited to virtual machine resources", "Bicep modules must be written in raw ARM JSON to work"], a: 1, d: "medium", e: "Bicep supports modules — one of the reasons it's easier to modularise infrastructure vs raw ARM JSON." },
  { q: "You need to trigger a script whenever a specific Azure event occurs (e.g. a new VM is created). Best fit?", o: ["Manually watching the Portal activity log tab", "Leaving Cloud Shell open with a watch loop", "Event Grid + Function or Logic App handler", "Portal desktop notifications shown in the browser", "Polling the ARM REST API every minute from a VM"], a: 2, d: "medium", e: "Event Grid publishes Azure resource events. Functions or Logic Apps can subscribe and act — the automation pattern for Azure events." },
  { q: "Which statement is TRUE about a service in Public Preview?", o: ["It has the same production SLA as generally available services", "It is restricted to premium subscription tiers only", "It is fully production-ready and covered by standard support", "It is only available to Microsoft MVPs and staff", "No SLA, may lack standard support, feature set may change before GA"], a: 4, d: "medium", e: "Public Preview services carry no SLA, may lack standard support, may have limited region coverage, and may change before GA. Free to try, but not for production." },
  { q: "Where can you browse and opt in to Azure Preview features specifically?", o: ["preview.portal.azure.com or the in-portal preview toggle", "Only through the standard portal.azure.com URL", "Through the learn.microsoft.com documentation hub", "Through the shell.azure.com Cloud Shell terminal"], a: 0, d: "medium", e: "preview.portal.azure.com surfaces preview features; the standard portal also has per-feature preview toggles. Cloud Shell and Learn are unrelated." },

  // HARD
  { q: "Which is TRUE about the choice between ARM templates and Bicep for new projects?", o: ["ARM JSON is preferred over Bicep for all new Azure projects", "They cannot deploy the same set of Azure resource types", "Bicep is a legacy format being phased out by Microsoft", "Terraform has replaced Bicep as Microsoft's default IaC", "Bicep is Microsoft's preferred choice — cleaner and modular"], a: 4, d: "hard", e: "Bicep is Microsoft's forward direction for Azure-native IaC. Use it for new projects unless you have a strong reason not to." },
  { q: "You have a mix of Azure VMs, on-prem Windows servers, and AWS EC2. You need one policy assignment to enforce a rule across all of them. Best approach?", o: ["It is impossible to unify these under one Policy scope", "Only manage the native Azure VMs and skip the others", "Enrol non-Azure resources into Arc, then assign Policy at MG scope", "Purchase AWS Config and manage the EC2 fleet separately"], a: 2, d: "hard", e: "Arc brings non-Azure resources into Azure's control plane, so a single Policy assignment can cover heterogeneous fleets." },
  { q: "Which is TRUE about idempotency in ARM/Bicep?", o: ["Applying the same template twice always duplicates resources", "ARM compares desired state to current and applies only needed changes", "Idempotency requires deleting resources before each re-deploy", "ARM/Bicep deployments do not support idempotent behaviour", "Idempotency is provided by wrapper scripts, not by ARM itself"], a: 1, d: "hard", e: "Declarative IaC compares desired vs current, then applies minimal changes. Safe to re-apply the same template." },
  { q: "Which is TRUE about the security of the Azure Portal?", o: ["It requires a dedicated private network you must configure", "It is engineered to fully bypass RBAC for admin convenience", "It can only be reached over ExpressRoute private peering", "HTTPS UI on ARM; same Entra ID + RBAC + Conditional Access as CLI/PS"], a: 3, d: "hard", e: "The Portal is just a UI on top of ARM. All security (identity, RBAC, Policy, MFA, Conditional Access) is enforced at ARM regardless of interface." },
  { q: "Which is TRUE about Azure Arc-enabled data services?", o: ["Run Azure SQL MI and PostgreSQL anywhere (on-prem, edge) with Azure mgmt", "Only databases already hosted in Azure regions are supported", "Data services can never be Arc-enabled under current policy", "Arc-enabled data services are limited to Azure Government cloud"], a: 0, d: "hard", e: "Arc-enabled data services let you run Azure PaaS databases wherever you have Kubernetes — with Azure-consistent management." },
  { q: "You need to deploy a large ARM template that references a URI-hosted linked template. What must the deployer have access to?", o: ["Nothing more than the standard Owner role at subscription scope", "Only the Reader role on the destination resource group", "The linked template URI must be reachable by ARM (public or SAS-protected)", "No special access — ARM inlines linked templates automatically", "The linked template must be embedded inline in the main file"], a: 2, d: "hard", e: "ARM must be able to fetch linked templates. Store them in a storage account with an accessible URL or SAS." },
  { q: "Which is TRUE about the Portal's dashboard feature?", o: ["Every user in the tenant sees an identical shared dashboard", "Each user can pin tiles to a personal customisable dashboard", "Only Owner role members are allowed to modify any dashboard", "Portal dashboards are strictly read-only for all users"], a: 1, d: "hard", e: "Portal dashboards are per-user customisable, pinning tiles for common resources, metrics, and shortcuts." },
  { q: "Which is TRUE about the interaction of Azure Arc + Azure Policy?", o: ["Arc-enabled resources cannot be governed by Azure Policy at all", "Only the Reader RBAC role works on Arc-enabled resources", "Policy enforcement on Arc requires migrating first to Azure", "Policy cascades to Arc-enabled resources just like native Azure resources"], a: 3, d: "hard", e: "Arc-enabled resources appear as Azure resources in your subscription. Policy applies to them just like it does to native Azure resources." },
  { q: "You are deploying to five different subscriptions with the same Bicep template. Best pattern?", o: ["Bicep parameter files per subscription, deployed via CI/CD", "Copy the template five times and edit each per subscription", "Perform manual portal deployment for each subscription", "Redeploy the environment from scratch after each edit"], a: 0, d: "hard", e: "Parameter files per environment + CI/CD + Git = the modern IaC pattern. Same template, different parameters." },
  { q: "Which is TRUE about the level of authorisation required to deploy via ARM template?", o: ["The Reader RBAC role is sufficient to deploy any template", "Only the subscription Owner is able to deploy ARM templates", "The identity must have RBAC create rights on each resource being deployed", "No RBAC checks apply to ARM template-based deployments", "Only the identity that created the resource group can deploy to it"], a: 2, d: "hard", e: "Deploying a template requires having permissions equivalent to what the deployment does. Reader can't deploy anything." },
  { q: "Which is TRUE about ARM's role in Policy enforcement?", o: ["Policy is only enforced when deployments come from Azure CLI", "ARM enforces Policy on all paths (Portal, CLI, PS, REST) — no bypass", "Policy applies only when initiated from the Azure mobile app", "Policy enforcement is optional and off by default"], a: 1, d: "hard", e: "Policy is central and unavoidable — as long as you go through ARM, Policy is enforced. Since everything goes through ARM, there's no bypass." },
  { q: "Which is TRUE about the difference between the Azure Portal and Azure Arc?", o: ["They are essentially the same product with different marketing names", "Arc has fully replaced the Portal as the default admin UI", "The Portal only functions after Azure Arc has been enabled", "Portal is the GUI; Arc extends ARM management to non-Azure resources", "The Portal is only accessible through the Azure Arc dashboard"], a: 3, d: "hard", e: "Portal = interface. Arc = the mechanism to bring non-Azure resources into that interface." }
];
</script>
<script src="quiz.js"></script>
</body>
</html>

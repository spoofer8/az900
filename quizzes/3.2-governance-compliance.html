<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3.2 Governance &amp; compliance · AZ-900 quiz</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 3 · Management and governance</span></div>
    <h1 class="q-title">Governance &amp; compliance</h1>
    <p class="q-subtitle">Microsoft Purview, Azure Policy, resource locks, Service Trust Portal.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
      <div class="feedback" id="feedback"><div class="feedback-verdict" id="feedback-verdict"></div><div class="feedback-explanation" id="feedback-explanation"></div></div>
      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>
  </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>
    </div>
    <h2 class="review-title">Review</h2>
    <div id="review"></div>
  </div>

</div>

<script>
window.QUIZ_META = { title: "Governance & compliance", code: "3.2", domain: "Domain 3" };

window.QUIZ_QUESTIONS = [
  // EASY
  { q: "Microsoft Purview is used for:", o: ["Compute orchestration and job scheduling", "Load balancing across multiple regions", "Data governance across your data estate", "Cost management and budget tracking"], a: 2, d: "easy", e: "Purview is Microsoft's unified data governance platform — data discovery, classification, lineage, and compliance across sources." },
  { q: "Azure Policy governs:", o: ["What configurations resources are allowed to have", "Who has access permissions to each resource", "How much each resource costs per month", "Physical security in Microsoft datacenters"], a: 0, d: "easy", e: "Policy enforces resource configuration standards (e.g. allowed regions, required tags, secure transfer required)." },
  { q: "RBAC governs:", o: ["Approved configuration standards for resources", "The physical infrastructure security layer", "Only virtual network access permissions", "Which identities can perform which actions"], a: 3, d: "easy", e: "RBAC is identity-based — it decides who can perform which actions on which resources." },
  { q: "Which is TRUE about the relationship between Policy and RBAC?", o: ["They are alternatives — pick one of them", "Policy has fully replaced RBAC in modern Azure", "RBAC is deprecated in favour of Policy", "They complement each other and should be used together"], a: 3, d: "easy", e: "Policy + RBAC are complementary. Policy = what's allowed to exist/happen. RBAC = who can act. Both are enforced by ARM at request time." },
  { q: "A policy 'definition' in Azure Policy is:", o: ["An identity role assignment for a user", "A single JSON rule for a resource type", "A resource lock at management-group scope", "A subscription-level governance container"], a: 1, d: "easy", e: "A policy definition is a single JSON rule (e.g. 'allowed locations = West Europe / UK South')." },
  { q: "A policy 'initiative' is:", o: ["A single JSON rule targeting one resource type", "A subscription for grouping related workloads", "A bundle of policy definitions (e.g. ISO 27001)", "A resource lock protecting critical resources"], a: 2, d: "easy", e: "Initiatives (also called policy sets) group many definitions for coherent governance packages." },
  { q: "Which of these is a valid Azure Policy effect?", o: ["Deny (block non-compliant requests)", "Reboot the resource on drift detection", "Format an attached storage disk", "Deploy anywhere without evaluation"], a: 0, d: "easy", e: "Common effects: audit, deny, append, modify, deployIfNotExists, auditIfNotExists, disabled." },
  { q: "Which effect blocks a non-compliant resource from being created?", o: ["Audit (logs only, no block)", "Deny (fails the request)", "Modify (adjusts properties)", "Disabled (evaluation off)"], a: 1, d: "easy", e: "The 'deny' effect blocks creation or modification if the resource doesn't meet policy criteria." },
  { q: "Which effect only logs a violation but does NOT block the action?", o: ["Deny (rejects the request)", "Modify (adjusts properties)", "AppendIfNotExists (adds fields)", "Audit (logs non-compliance)"], a: 3, d: "easy", e: "Audit records non-compliance without blocking — useful for measuring drift or preparing a rollout." },
  { q: "A resource lock has how many types?", o: ["1 type (Delete only)", "3 types (Read, Write, Delete)", "2 types (ReadOnly and Delete)", "5 types (one per scope level)"], a: 2, d: "easy", e: "Two lock types: ReadOnly (no modify, no delete) and Delete/CanNotDelete (modify allowed, no delete)." },
  { q: "A 'ReadOnly' lock:", o: ["Blocks both modify and delete operations", "Allows delete but prevents modification", "Blocks read but allows modifications", "Has no effect on Owner-role users"], a: 0, d: "easy", e: "ReadOnly = no modify AND no delete. Even Owners are affected — the lock must be removed first." },
  { q: "A 'Delete' (CanNotDelete) lock:", o: ["Blocks both modify and delete operations", "Allows modification but blocks deletion", "Blocks all read requests to the resource", "Only applies to blob-storage containers"], a: 1, d: "easy", e: "Delete lock allows modification but blocks deletion. Useful for critical resources that need updates but must not be removed." },
  { q: "Resource locks can be applied at which scopes?", o: ["Only at the tenant root scope", "Only at management-group scope", "Only at individual-resource scope", "At subscription, resource group, or resource"], a: 3, d: "easy", e: "Locks work at subscription, RG, or resource scope. They inherit down." },
  { q: "The Service Trust Portal is:", o: ["A cost-management and billing dashboard", "A network firewall for external traffic", "Microsoft's public repository of audit reports", "A workload-monitoring and alerting tool"], a: 2, d: "easy", e: "Service Trust Portal (servicetrust.microsoft.com) hosts SOC / ISO / FedRAMP / HIPAA / PCI reports and compliance guides." },
  { q: "Which compliance framework focuses on the EU personal-data protection?", o: ["GDPR (General Data Protection Regulation)", "FedRAMP (US federal cloud program)", "PCI-DSS (payment-card standard)", "SOX (Sarbanes-Oxley financial law)"], a: 0, d: "easy", e: "GDPR = General Data Protection Regulation, EU's personal-data protection law." },
  { q: "Which compliance framework applies to US healthcare data?", o: ["ISO 27001 (information security standard)", "HIPAA (US healthcare privacy law)", "PCI-DSS (payment card industry standard)", "FedRAMP (US federal cloud program)"], a: 1, d: "easy", e: "HIPAA (Health Insurance Portability and Accountability Act) governs US healthcare data protection. HITRUST is a common implementation framework." },
  { q: "Which compliance framework applies to US federal government cloud use?", o: ["GDPR (EU personal-data regulation)", "PCI-DSS (payment card standard)", "FedRAMP (US federal cloud program)", "HIPAA (US healthcare privacy)"], a: 2, d: "easy", e: "FedRAMP = Federal Risk and Authorization Management Program — standard for US federal cloud services." },
  { q: "Which compliance framework applies to payment card data?", o: ["PCI-DSS (payment-card industry standard)", "HIPAA (US healthcare privacy law)", "FedRAMP (US federal cloud program)", "GDPR (EU personal-data regulation)"], a: 0, d: "easy", e: "PCI-DSS = Payment Card Industry Data Security Standard. Applies to any org handling cardholder data." },
  { q: "ISO 27001 is:", o: ["A payment-card processing framework", "A cloud-pricing and reservation model", "A managed backup and restore service", "An international standard for information security (ISMS)"], a: 3, d: "easy", e: "ISO 27001 is the international standard for ISMS — widely adopted for security certification." },
  { q: "SOC audit reports (SOC 1 / 2 / 3) apply to:", o: ["Controls limited to US healthcare providers only", "Service organisation controls at cloud/data providers", "Payment card processing systems exclusively", "Government workloads and federal agencies only"], a: 1, d: "easy", e: "SOC reports assess how service providers manage security, availability, processing integrity, confidentiality, and privacy." },

  // MEDIUM
  { q: "You want to prevent anyone from deploying storage accounts without 'secure transfer required' (HTTPS-only). Best tool?", o: ["Azure Policy with a 'deny' effect on the setting", "RBAC role assignments restricting the team", "A resource lock on the storage account", "Microsoft Purview data classification scan"], a: 0, d: "medium", e: "Policy with 'deny' can enforce configuration standards — RBAC governs who can act, not what's allowed." },
  { q: "You want to prevent a specific team from deleting a specific database. Best combination?", o: ["RBAC Reader role for the team is sufficient", "Azure Firewall rules blocking their IP addresses", "A Delete lock on the database alone is enough", "A Delete lock plus RBAC restricting who can unlock", "Purview policies blocking deletion operations"], a: 3, d: "medium", e: "Locks apply on top of RBAC. Combine a Delete lock with restricting who has 'Microsoft.Authorization/*' to remove the lock." },
  { q: "An auditor requests Microsoft's SOC 2 Type II attestation for Azure. Where do you find it?", o: ["Azure Advisor recommendation feed", "Service Trust Portal compliance library", "Microsoft Cost Management portal", "Microsoft Sentinel workspace dashboard"], a: 1, d: "medium", e: "Service Trust Portal is the public library of Microsoft's audit reports and compliance documentation." },
  { q: "You need to automatically classify PII across many storage accounts and databases. Best tool?", o: ["Azure Policy with an append effect", "Cost Management with tag rules", "Microsoft Purview data classification", "Azure Advisor with a data-scan feature"], a: 2, d: "medium", e: "Purview auto-scans data sources, classifies content (PII, financial, health), and tracks lineage across your estate." },
  { q: "You want ONE policy to apply across 20 subscriptions in your organisation. Best approach?", o: ["Assign the policy to each subscription individually", "Use RBAC role assignments to enforce compliance", "Apply resource locks on each subscription root", "Assign at a Management Group above the subscriptions"], a: 3, d: "medium", e: "Policies at management group scope cascade to all child subs. Single assignment covers all 20." },
  { q: "Which is TRUE about resource locks?", o: ["Even Owners must remove the lock before deleting", "Owner-role users bypass locks automatically", "Only Readers are affected; higher roles bypass", "Locks are subscription-scoped only, not RG scope"], a: 0, d: "medium", e: "Locks apply universally regardless of RBAC. To bypass, you must first remove the lock — which requires 'Microsoft.Authorization/*' rights." },
  { q: "You want Azure Policy to automatically add a diagnostic settings resource whenever a storage account is created. Best effect?", o: ["Audit (log-only, no action)", "Deny (block the deployment)", "Disabled (no evaluation)", "Modify (change tags on target)", "DeployIfNotExists (deploy related resource)"], a: 4, d: "medium", e: "DeployIfNotExists deploys a related resource (like diagnostic settings) when the target resource is created without one." },
  { q: "You want to enforce that every new resource has an 'Environment' tag. Best effect?", o: ["Audit-only for the missing tag", "Reader RBAC assignment on the RG", "Deny (block) or Modify (auto-add the tag)", "Delete lock on any resource without the tag", "DeployIfNotExists for a linked Tag resource"], a: 2, d: "medium", e: "Deny blocks resource creation without the tag. Modify (or append) can auto-add it. Both are valid strategies." },
  { q: "Which is TRUE about Azure Policy vs RBAC in terms of enforcement?", o: ["Only Policy is enforced at deployment time", "Both are enforced by ARM; a request must pass both", "RBAC is enforced later by a background job", "Neither is enforced automatically; audits only"], a: 1, d: "medium", e: "Every ARM request must pass RBAC (who) AND Policy (what). If either fails, the request is rejected." },
  { q: "Which is TRUE about ReadOnly locks and VMs?", o: ["They can block VM start/stop as those change state", "They have no side effects on running VMs", "They only apply to attached managed disks", "They only affect virtual network peerings"], a: 0, d: "medium", e: "ReadOnly is strict — even start/stop, which change VM state, can be blocked. Use Delete lock instead if operations must remain possible." },
  { q: "Which is TRUE about Microsoft Purview's scope?", o: ["It only scans Azure Blob Storage containers", "It is limited to on-premises data sources", "It is a managed backup and restore tool", "It scans Azure, on-prem, other clouds, and SaaS"], a: 3, d: "medium", e: "Purview scans a wide range of data sources across your estate — Azure, AWS, on-prem, and SaaS." },
  { q: "A company wants to run an audit against ISO 27001 controls in Azure. Best resource?", o: ["Microsoft Purview data classification alone", "Azure Advisor with an ISO 27001 checkbox", "Service Trust Portal plus Purview Compliance Manager", "Azure Bastion audit-mode dashboard", "Cost Management compliance-report feature"], a: 2, d: "medium", e: "Service Trust Portal provides evidence documentation. Compliance Manager (within Purview) helps assess and manage your ongoing compliance posture." },
  { q: "Which is TRUE about built-in Azure Policy definitions?", o: ["There are only 5 built-in definitions total", "There are hundreds spanning many governance areas", "You must always write your own custom policies", "Built-in definitions only apply to virtual machines"], a: 1, d: "medium", e: "Azure ships with 100s of built-in policies. Custom policies are also possible when built-ins don't cover a specific need." },
  { q: "You want to prevent VMs from being created outside three approved regions. Best policy configuration?", o: ["'Allowed locations' built-in policy with deny effect", "RBAC restricting deploy permission by region", "Resource lock on every regional resource group", "Purview data-classification tag on VM resources", "Azure Firewall rules blocking cross-region traffic"], a: 0, d: "medium", e: "The built-in 'Allowed locations' policy enforces region restrictions with deny." },
  { q: "Which is FALSE about the difference between Purview and Azure Policy?", o: ["Purview governs data discovery and classification", "Policy governs resource configuration and standards", "They complement each other in a governance strategy", "They are effectively the same product with two names"], a: 3, d: "medium", e: "Purview = data. Policy = resource configuration. Different tools for different governance layers." },
  { q: "You need to prove Microsoft's Azure Government offering meets FedRAMP High. Best source?", o: ["Guess based on the marketing website", "A public Reddit thread on GovCloud", "Service Trust Portal compliance documents", "Delete the workload from Azure Government", "The Azure Portal 'compliance' blade only"], a: 2, d: "medium", e: "Service Trust Portal has FedRAMP attestations and boundary documents for Azure and Azure Government." },
  { q: "Which effect will BOTH block non-compliant resources and log them?", o: ["Audit (logs but does not block)", "Deny (blocks and logs as non-compliant)", "Modify (rewrites resource properties)", "AuditIfNotExists (logs missing dependents)"], a: 1, d: "medium", e: "'Deny' blocks the request. Any denied deployment is also visible in activity logs and compliance reports." },
  { q: "You need to ensure a legal hold on a specific storage container — no deletion for 7 years. Best fit?", o: ["RBAC Reader role on the storage account", "Delete the container after 7 years manually", "Rely on backups and versioning alone", "Immutable blob policy plus a Delete lock on account", "Azure Policy audit effect on delete actions"], a: 3, d: "medium", e: "Storage-level immutable policies + resource locks + Policy give layered protection for legally-mandated retention." },
  { q: "Which is TRUE about Microsoft Purview Compliance Manager?", o: ["A live compliance-posture tool with scoring and actions", "A firewall for classified data workloads", "A static PDF report of past audit results", "A direct replacement for the Service Trust Portal"], a: 0, d: "medium", e: "Compliance Manager is a live tool for tracking and improving your compliance posture. Service Trust Portal is the doc repository." },
  { q: "Which is a valid way to standardise deployment configurations while also meeting policy?", o: ["Manual deployment for every environment", "Rely only on operator memory and checklists", "Never automate any resource deployments", "Use IaC templates alone without any policy", "Combine IaC templates with Azure Policy for enforcement"], a: 4, d: "medium", e: "IaC + Policy is the modern pattern — templates express intent, policy ensures compliance even when someone bypasses templates." },
  { q: "At which of these scopes CAN'T you apply a resource lock?", o: ["Subscription root scope", "Individual resource scope", "Management group scope", "Resource group scope"], a: 2, d: "medium", e: "Locks apply at Subscription, Resource Group, or Resource scope only. NOT at Management Group. A classic gotcha." },
  { q: "Which built-in roles can create or delete resource locks?", o: ["Only the Owner role at each scope", "Owner and User Access Administrator roles", "Owner and Contributor roles at scope", "Any role with write access on the resource", "The Reader role plus Security Admin role"], a: 1, d: "medium", e: "Only Owner and User Access Administrator hold Microsoft.Authorization/locks/*. Contributors can build/destroy resources but not the locks that protect them." },

  // HARD
  { q: "Which is TRUE about the difference between Policy audit and deny effects?", o: ["Both effects block deployments equally", "Deny only affects read requests, not writes", "They function the same way in practice", "Audit only logs; deny blocks. Roll out audit first, then deny"], a: 3, d: "hard", e: "Progressive rollout pattern: start with audit to see what breaks. Analyse, exempt where needed, then flip to deny." },
  { q: "You accidentally applied a ReadOnly lock to a critical VM and now cannot restart it. What's the fix?", o: ["Remove the lock (needs authorisation rights), then restart", "Delete the VM entirely and redeploy from a backup", "Wait 24 hours for the lock to time out on its own", "Call Microsoft Support to unlock via a ticket", "Change the RBAC role to Owner to override the lock"], a: 0, d: "hard", e: "Remove the lock (requires appropriate authorisation permissions), perform the operation, and (if needed) reapply the lock." },
  { q: "Which is TRUE about the scope inheritance of Azure Policy?", o: ["Policies apply only at the exact scope assigned", "Policies never cascade downward under any effect", "Policies cascade down from MG/subscription to children", "Only 'audit' effects cascade; 'deny' does not inherit", "Cascade requires enabling a separate inheritance flag"], a: 2, d: "hard", e: "Policies inherit down: MG → Sub → RG → Resource. Assign at the highest useful scope for organisation-wide coverage." },
  { q: "Which is TRUE about the difference between 'audit' and 'auditIfNotExists' effects?", o: ["They function identically at ARM request time", "'audit' checks the resource; 'auditIfNotExists' checks a related one", "'audit' is a stronger, blocking variant of the effect", "'auditIfNotExists' blocks deployments that fail"], a: 1, d: "hard", e: "'auditIfNotExists' fires when a related dependent resource doesn't exist (e.g. audit a VM if it lacks a required extension)." },
  { q: "You have a policy assigned to a management group that denies certain SKUs. A subscription under it deploys via ARM template — will the policy prevent the deploy?", o: ["No — ARM templates bypass Policy by design", "Only if the deploy is triggered manually via CLI", "Only if the deployer has the Reader RBAC role", "Yes — policy is enforced by ARM on every deploy path"], a: 3, d: "hard", e: "Policy is enforced by ARM, so every deployment path is subject to it — including ARM templates and Bicep." },
  { q: "Which is TRUE about custom RBAC roles vs Azure Policy?", o: ["Custom RBAC tailors user actions; Policy tailors configurations", "Custom RBAC roles directly enforce resource configuration", "They are functionally interchangeable in Azure", "Custom RBAC roles fully replace Azure Policy", "Custom Policy definitions control identity assignments"], a: 0, d: "hard", e: "Custom RBAC = tailored identity permissions. Custom Policy = tailored configuration rules. Different governance dimensions." },
  { q: "Which is TRUE about resource locks and cost?", o: ["Locks incur a per-hour charge like any resource", "Locks require the Premium subscription tier", "Locks are free — no additional cost to use", "Locks only work when combined with reservations"], a: 2, d: "hard", e: "Locks are a free governance feature — no additional cost beyond the resource itself." },
  { q: "You want to enforce that any new resource without an 'Owner' tag gets tagged with 'Owner = <creator>'. Best effect?", o: ["Deny (blocks creation if the tag is missing)", "Modify (auto-adds the tag at creation time)", "Audit (logs missing tags without action)", "Disabled (no evaluation on the resource)", "DeployIfNotExists (deploys a tag-linked resource)"], a: 1, d: "hard", e: "'Modify' adds/removes/updates properties (like tags) on resource creation or update — the right tool for auto-tagging." },
  { q: "Which is TRUE about the layers of governance in Azure?", o: ["Only RBAC is required for full governance", "There is only one control plane — Policy", "Governance is entirely optional in the cloud", "One tool (Purview) covers all governance needs", "Governance combines Policy, RBAC, locks, tags, and Purview"], a: 4, d: "hard", e: "Real-world governance uses several complementary tools. Each addresses a different dimension." },
  { q: "Which is TRUE about compliance in Azure?", o: ["Microsoft handles compliance; the customer has no role", "The customer alone is fully responsible for compliance", "Compliance obligations are impossible to meet in cloud", "Compliance is shared between Microsoft and the customer"], a: 3, d: "hard", e: "Compliance is shared. Microsoft attests the platform's controls; the customer must configure services (data, encryption, access) to meet their obligations." },
  { q: "Which is TRUE about the interaction between Policy and IaC templates (ARM/Bicep)?", o: ["Templates go through ARM; non-compliant ones fail to deploy", "IaC templates bypass all Azure Policy evaluations", "Policy applies only to Azure Portal deployments", "IaC entirely replaces Azure Policy as an enforcement tool"], a: 0, d: "hard", e: "All deployments go through ARM. Policy is enforced by ARM. A non-compliant template will be rejected at deploy time." },
  { q: "Which is TRUE about scope narrowing for Policy assignments?", o: ["Always assign every policy at the root MG level", "Only assign policies at individual resource scope", "Assign at the tightest useful scope — MG, subscription, or RG", "Never assign policies; use RBAC exclusively instead", "Assignments must be duplicated at every scope level"], a: 2, d: "hard", e: "Choose the tightest scope that meets the intent. Root MG for global rules, subs / RGs for narrower ones." },
  { q: "Which Microsoft document specifies Microsoft's data-processing obligations (GDPR and similar) and supplements the Product Terms?", o: ["Microsoft Privacy Statement (user-facing usage)", "Data Protection Addendum (DPA)", "Microsoft Trust Center (approach portal)", "Service Trust Portal (audit repository)", "Product Terms Appendix A (pricing terms)"], a: 1, d: "hard", e: "The DPA supplements the Product Terms with data-processing commitments. Privacy Statement is user-facing data usage; Trust Center is a portal describing Microsoft's approach; Service Trust Portal holds the audit reports." }
];
</script>
<script src="quiz.js"></script>
</body>
</html>

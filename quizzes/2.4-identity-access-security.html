<!DOCTYPE html>

  <title>2.4 Identity, access &amp; security · AZ-900 quiz</title>

</head>
<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 2 · Architecture and services</span></div>
    <h1 class="q-title">Identity, access &amp; security</h1>
    <p class="q-subtitle">Entra ID, MFA, RBAC, Conditional Access, Zero Trust, Defender for Cloud.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
      <div class="feedback" id="feedback"><div class="feedback-verdict" id="feedback-verdict"></div><div class="feedback-explanation" id="feedback-explanation"></div></div>
      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>
  </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>

    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>
    </div>
    <h2 class="review-title">Review</h2>
    <div id="review"></div>
  </div>

</div>

<script>
window.QUIZ_META = { title: "Identity, access & security", code: "2.4", domain: "Domain 2" };

window.QUIZ_QUESTIONS = [
  // EASY
  { q: "Microsoft Entra ID was formerly known as:", o: ["Windows Server AD", "Azure Active Directory", "Azure Identity", "Microsoft Passport"], a: 1, d: "easy", e: "Microsoft renamed Azure Active Directory to Microsoft Entra ID in 2023. Same service, new name." },
  { q: "Microsoft Entra ID is:", o: ["An on-prem directory service", "A cloud-based identity and access management service", "A file storage service", "A monitoring service"], a: 1, d: "easy", e: "Entra ID is Microsoft's cloud identity platform for authentication, SSO, MFA, and access control." },
  { q: "Which protocols does Entra ID primarily use?", o: ["Kerberos, LDAP, NTLM", "OAuth 2.0, OpenID Connect, SAML", "SMB, FTP", "SSH, Telnet"], a: 1, d: "easy", e: "Entra ID uses modern web identity protocols: OAuth 2.0, OpenID Connect, SAML. Not Kerberos/LDAP/NTLM." },
  { q: "Which service provides a managed AD DS-compatible experience (Kerberos, LDAP, Group Policy) in Azure?", o: ["Microsoft Entra ID", "Microsoft Entra Domain Services", "Azure Bastion", "Azure Firewall"], a: 1, d: "easy", e: "Entra Domain Services is managed AD DS in Azure — supports Kerberos, LDAP, NTLM, and Group Policy for legacy apps." },
  { q: "What does 'authentication' answer?", o: ["What are you allowed to do?", "Who are you?", "Where are you?", "When did you log in?"], a: 1, d: "easy", e: "Authentication = 'Who are you?'. Authorisation = 'What can you do?'." },
  { q: "What does 'authorisation' answer?", o: ["Who are you?", "What are you allowed to do?", "Where are you?", "How much does it cost?"], a: 1, d: "easy", e: "Authorisation determines what an authenticated identity is allowed to do — usually via RBAC." },
  { q: "MFA requires at least how many different factor types?", o: ["1", "2", "3", "4"], a: 1, d: "easy", e: "MFA = multi-factor authentication — at least 2 of: something you know / have / are." },
  { q: "Which is a valid MFA factor category?", o: ["Something you know, have, or are", "Something you own, borrow, or share", "Passwords only", "Location and time"], a: 0, d: "easy", e: "Classic MFA categories: know (password/PIN), have (phone/key), are (biometric)." },
  { q: "Which of these is an example of PASSWORDLESS authentication?", o: ["A username + password", "Windows Hello / FIDO2 / Microsoft Authenticator", "SMS-based verification", "IP address whitelist"], a: 1, d: "easy", e: "Passwordless removes the password entirely: Windows Hello (biometric/PIN), FIDO2 keys, Microsoft Authenticator." },
  { q: "SSO means:", o: ["Single Server Operation", "Single Sign-On — one login for many apps", "Simple Security Object", "Secure Socket Origin"], a: 1, d: "easy", e: "Single Sign-On: one authentication session unlocks access to multiple applications." },
  { q: "Which service lets external partners access resources with their own identities?", o: ["Entra External ID for B2B", "Entra External ID for B2C", "Azure Firewall", "Bastion"], a: 0, d: "easy", e: "B2B (business-to-business) invites external users as guests. They keep their own identity; you grant them access." },
  { q: "Which service provides identity for customer-facing apps (customers sign up with social or local accounts)?", o: ["Entra External ID for B2B", "Entra External ID for B2C", "Azure Firewall", "AD DS"], a: 1, d: "easy", e: "B2C (business-to-consumer) is for consumer identity — customers sign up with email, Google, Facebook, etc." },
  { q: "Which RBAC role has FULL access AND can grant access to other users?", o: ["Owner", "Contributor", "Reader", "User"], a: 0, d: "easy", e: "Owner has full management access AND the ability to grant access to others. Contributor cannot grant access." },
  { q: "Which RBAC role can manage everything except access?", o: ["Owner", "Contributor", "Reader", "User Access Administrator"], a: 1, d: "easy", e: "Contributor has full management access but CANNOT delegate/grant access. That's the Owner's distinctive power." },
  { q: "Which RBAC role can only view resources?", o: ["Owner", "Contributor", "Reader", "User Access Administrator"], a: 2, d: "easy", e: "Reader can view but not modify. Ideal for auditors or read-only users." },
  { q: "Which RBAC role manages access assignments but not resources?", o: ["Owner", "Contributor", "Reader", "User Access Administrator"], a: 3, d: "easy", e: "User Access Administrator (UAA) can grant/revoke RBAC assignments but has no direct resource management rights." },
  { q: "RBAC assignments are made at what scopes?", o: ["Only at subscription", "Management group / Subscription / Resource group / Resource", "Only at resource level", "Only at tenant level"], a: 1, d: "easy", e: "RBAC scopes: MG → Sub → RG → Resource. Permissions inherit down the hierarchy." },
  { q: "Zero Trust has how many core principles?", o: ["1", "2", "3", "5"], a: 2, d: "easy", e: "Zero Trust: (1) verify explicitly, (2) use least-privilege access, (3) assume breach." },
  { q: "Defense in depth has how many layers (per Microsoft's model)?", o: ["3", "5", "7", "10"], a: 2, d: "easy", e: "Seven layers: physical, identity & access, perimeter, network, compute, application, data." },
  { q: "Which is Azure's Cloud Security Posture Management (CSPM) service that produces a Secure Score?", o: ["Microsoft Sentinel", "Microsoft Defender for Cloud", "Key Vault", "Azure Firewall"], a: 1, d: "easy", e: "Defender for Cloud provides CSPM + workload protection. Secure Score tracks your posture as a percentage." },
  { q: "Which service is Azure's cloud-native SIEM/SOAR?", o: ["Defender for Cloud", "Microsoft Sentinel", "Azure Monitor", "Azure Firewall"], a: 1, d: "easy", e: "Microsoft Sentinel is a cloud-native SIEM (Security Info & Event Management) + SOAR (Security Orchestration Automation & Response)." },
  { q: "Which service securely stores secrets, keys, and certificates?", o: ["Azure Storage", "Azure Key Vault", "Azure Firewall", "Defender for Cloud"], a: 1, d: "easy", e: "Azure Key Vault is Microsoft's managed secret / key / certificate store, with Entra ID-based access." },
  { q: "Azure DDoS Protection Basic:", o: ["Is a paid add-on", "Is enabled by default for all Azure resources with a public IP, free, and provides automatic mitigation of common attacks", "Requires a Standard plan", "Is deprecated"], a: 1, d: "easy", e: "DDoS Basic is always on, free, and requires no configuration. Standard tier adds SLA, monitoring, cost protection, and integration with WAF." },
  { q: "Azure Firewall is:", o: ["An identity service", "A managed, stateful L4–L7 firewall with threat-intelligence filtering", "A load balancer", "A monitoring tool"], a: 1, d: "easy", e: "Azure Firewall is a managed L4–L7 firewall with application rules (FQDN), network rules, and threat intelligence." },
  { q: "The Zero Trust principle 'Verify explicitly' means:", o: ["Trust internal network traffic", "Always authenticate and authorise based on all available signals (identity, device, location, workload, data)", "Only verify at login", "Encrypt everything"], a: 1, d: "easy", e: "Verify explicitly = re-authenticate/authorise using all relevant signals, every time. No implicit trust." },

  // MEDIUM
  { q: "A user has Contributor rights on a resource group. What can they NOT do?", o: ["Create new VMs", "Modify existing resources", "Grant access to other users (that requires Owner or UAA)", "Delete resources"], a: 2, d: "medium", e: "Contributor can do everything except manage/grant access. That's the Owner or User Access Administrator role's job." },
  { q: "You want to require MFA only when a sign-in is risky (unfamiliar location, unfamiliar device). Best feature?", o: ["Set MFA globally for all users", "Conditional Access with risk-based policies", "SAS tokens", "Azure Firewall"], a: 1, d: "medium", e: "Conditional Access is exactly this — evaluate signals (risk, location, device) and apply MFA when needed." },
  { q: "A partner company needs access to a project resource group. Best approach?", o: ["Create Azure accounts for each partner user", "Use Entra External ID for B2B to invite them as guest users with their existing accounts", "Give them the subscription owner's password", "Share the storage account key"], a: 1, d: "medium", e: "B2B lets partners bring their own identity. They authenticate with their own IdP; you assign them RBAC on your resources." },
  { q: "You want customers to sign up for your public web app using their Google or email accounts. Best service?", o: ["Entra External ID for B2B", "Entra External ID for B2C", "Windows Server AD", "Entra Domain Services"], a: 1, d: "medium", e: "B2C is for consumer identity — social sign-in (Google, Facebook), local accounts, and consumer-scale identity flows." },
  { q: "Which is TRUE about the difference between authentication and authorisation?", o: ["They mean the same thing", "Authentication verifies identity (who); authorisation verifies permission (what)", "Both are the same thing in Azure", "Only Owners are authorised"], a: 1, d: "medium", e: "Authentication = who you are. Authorisation = what you can do. Sequential steps." },
  { q: "You want a legacy app that requires LDAP and Kerberos to run in Azure without deploying domain controllers. Best fit?", o: ["Entra ID only", "Entra Domain Services (managed AD DS)", "Azure Firewall", "Key Vault"], a: 1, d: "medium", e: "Entra Domain Services provides managed AD DS-compatible services (Kerberos, LDAP, Group Policy) without you managing domain controllers." },
  { q: "Windows Hello for Business is an example of:", o: ["Multi-factor authentication only", "Passwordless authentication (biometric or PIN with TPM binding)", "SSO", "Kerberos"], a: 1, d: "medium", e: "Windows Hello for Business is passwordless — TPM-bound credential + biometric or PIN. Not just MFA (which still uses passwords)." },
  { q: "Which is TRUE about Conditional Access?", o: ["It's part of Entra ID Free", "It requires Entra ID P1 (or higher); Free tier gets 'Security Defaults' preset", "It's a monitoring tool only", "It replaces RBAC"], a: 1, d: "medium", e: "Full Conditional Access requires P1+. Free tier can only enable a simpler 'Security Defaults' preset." },
  { q: "Which of these is a Zero Trust principle?", o: ["Trust everything inside the firewall", "Assume breach", "Only encrypt data in transit", "Always allow admin access"], a: 1, d: "medium", e: "Zero Trust: verify explicitly, least privilege, assume breach. 'Assume breach' means design so a compromise is contained." },
  { q: "An Application Security Group (ASG) is used to:", o: ["Replace an NSG", "Group VMs by application role (e.g. 'WebServers') so NSG rules reference the role, not IPs", "Provide DDoS protection", "Manage secrets"], a: 1, d: "medium", e: "ASGs make NSG rules cleaner and less brittle — reference application roles instead of hard-coded IPs." },
  { q: "Which is TRUE about RBAC inheritance?", o: ["Assignments only apply at the exact scope", "Assignments inherit down the hierarchy (MG → Sub → RG → Resource)", "Only Owner inherits", "RBAC has no inheritance"], a: 1, d: "medium", e: "RBAC roles assigned at a higher scope automatically apply to everything below it." },
  { q: "Which is TRUE about Azure Policy vs RBAC?", o: ["They are alternatives; pick one", "Policy governs what configurations are allowed; RBAC governs who can act. Both apply, and both must pass", "Policy replaces RBAC", "RBAC is deprecated"], a: 1, d: "medium", e: "Policy = configuration governance. RBAC = identity permission. Complementary tools; both are enforced by ARM." },
  { q: "Which is BEST for storing an application's database connection string safely?", o: ["Hard-code it in the app", "In an environment variable in the code repo", "Azure Key Vault, retrieved by the app using its Entra ID identity", "Public blob storage"], a: 2, d: "medium", e: "Key Vault + managed identity is the recommended pattern — no secrets in code or config files." },
  { q: "You want detection of a suspected security incident using logs from Azure, AWS, on-prem, and third parties. Best service?", o: ["Defender for Cloud alone", "Microsoft Sentinel", "Azure Monitor alone", "Azure Firewall"], a: 1, d: "medium", e: "Microsoft Sentinel is Azure's SIEM/SOAR — ingest logs from anywhere, detect with analytics + threat intel, automate response with playbooks." },
  { q: "Defender for Cloud's Secure Score does what?", o: ["Assesses your Azure security posture as a percentage, with prioritised recommendations", "Blocks malicious IPs automatically", "Encrypts your data", "Replaces Sentinel"], a: 0, d: "medium", e: "Secure Score tracks your posture (0-100%) against best-practice recommendations. Higher score = fewer risky configurations." },
  { q: "You want to protect a specific critical VM from being deleted, even by owners, unless the lock is removed. Use:", o: ["An NSG", "A resource lock (Delete)", "RBAC Reader role", "Encryption"], a: 1, d: "medium", e: "Resource locks (Delete or ReadOnly) apply on top of RBAC — even Owner cannot delete a locked resource without first removing the lock." },
  { q: "Which is TRUE about the layers of Defense in Depth?", o: ["Data is the outermost layer", "Physical is the outermost layer; data is at the core", "There are only 3 layers", "Application is the outermost layer"], a: 1, d: "medium", e: "Layers from outside in: Physical → Identity & Access → Perimeter → Network → Compute → Application → Data." },
  { q: "Which of these is a valid Azure external identity offering?", o: ["Entra External ID for B2B (guest partners) and B2C (customer identity)", "Entra Outsider", "Azure IdentitySpaces", "External RBAC"], a: 0, d: "medium", e: "Two flavours: B2B for partner/guest collaboration, B2C for customer-facing consumer identity." },
  { q: "Which is TRUE about NSGs (Network Security Groups)?", o: ["They are stateless", "They are stateful — return traffic is automatically allowed", "They can only be applied to VMs", "They cannot use ASGs"], a: 1, d: "medium", e: "NSGs are stateful — you don't need matching outbound rules for allowed inbound traffic." },
  { q: "Azure DDoS Protection Standard adds which over Basic?", o: ["Nothing new", "Enhanced mitigation with SLA, monitoring, cost protection, and WAF integration", "Only encryption", "Only free tier"], a: 1, d: "medium", e: "Standard tier adds tuned protection, real-time mitigation reports, cost protection, and pairs with Application Gateway WAF." },
  { q: "Which is TRUE about Microsoft Sentinel?", o: ["It only handles Azure logs", "It ingests logs from Azure, other clouds, on-prem, and third parties for threat detection and automated response", "It's a firewall", "It replaces Defender for Cloud"], a: 1, d: "medium", e: "Sentinel is a broad SIEM/SOAR — data connectors span multi-cloud, on-prem, and third-party sources." },

  // HARD
  { q: "Which is TRUE about the distinction between Entra ID and Windows Server AD DS?", o: ["They are the same product", "Entra ID uses modern web protocols (OAuth/OIDC/SAML) and is flat; AD DS uses Kerberos/LDAP/NTLM and is hierarchical with OUs", "AD DS is cloud-native, Entra ID is on-prem", "Entra ID supports Group Policy"], a: 1, d: "hard", e: "Entra ID is cloud-native, protocol-modern, flat structure. AD DS is traditional on-prem, protocol-legacy, hierarchical. Group Policy is AD DS only." },
  { q: "A user has Owner on subscription A and Reader on subscription B. Can they grant Contributor role to a colleague on subscription B?", o: ["Yes, Owner elsewhere grants global powers", "No — RBAC is scoped; Reader on B doesn't include permission to grant roles on B", "Yes if Reader is on the tenant", "Only for their own account"], a: 1, d: "hard", e: "RBAC assignments are per-scope. Reader on B doesn't give any granting powers on B, regardless of Owner elsewhere." },
  { q: "Which of the following describes a valid Zero Trust design choice?", o: ["Trusting a VM because it's inside a private network", "Requiring MFA and device compliance even for internal API calls", "Disabling authentication behind the firewall", "Allowing broad admin rights to reduce friction"], a: 1, d: "hard", e: "Zero Trust means never trusting internal traffic implicitly. Every request is authenticated and authorised based on signals." },
  { q: "Which of these is TRUE about MFA vs passwordless?", o: ["They are the same thing", "MFA still uses a password + a second factor; passwordless removes the password entirely (e.g. FIDO2, Windows Hello)", "Passwordless is a subset of MFA", "MFA is deprecated"], a: 1, d: "hard", e: "MFA layers extra factors on top of a password. Passwordless removes the password. Passwordless methods are inherently strong-factor authentications." },
  { q: "Which of these is TRUE about the interaction of RBAC and resource locks?", o: ["Locks are applied only to Readers", "Locks apply on top of RBAC — even Owners cannot delete a Delete-locked resource without first removing the lock", "Locks override RBAC entirely — no one has any access", "Locks and RBAC are the same"], a: 1, d: "hard", e: "Locks apply to everyone regardless of role. To modify/delete a locked resource, remove the lock first — which requires 'Microsoft.Authorization/*' permission." },
  { q: "Which is TRUE about built-in RBAC roles?", o: ["There are only 4", "There are hundreds of built-in roles, plus support for custom roles", "Owner is the only usable role", "Custom roles are not supported"], a: 1, d: "hard", e: "Azure has ~120+ built-in roles for granular scoping (e.g. Storage Blob Data Reader, SQL DB Contributor). Custom roles are also supported." },
  { q: "Which of the following is TRUE about Conditional Access?", o: ["It evaluates only user + password", "It evaluates multiple signals (user, group, app, device state, location, real-time risk) and applies controls (require MFA, block, require compliant device)", "It replaces RBAC", "It requires a physical device"], a: 1, d: "hard", e: "Conditional Access is signal-driven policy at sign-in: identity + device + location + risk + workload → decision (allow / block / require MFA / restrict session)." },
  { q: "You want defense-in-depth for a critical web app. Which layered controls make sense?", o: ["Only enable HTTPS", "Front Door WAF (perimeter) + NSG (network) + App Service TLS + Managed Identity + Key Vault + encryption at rest", "Only public IP allowlist", "Rely on Defender for Cloud alone"], a: 1, d: "hard", e: "Defense in depth = layered controls at each layer (identity, perimeter, network, compute, app, data). Any one control could fail, but not all at once." },
  { q: "Which is TRUE about Defender for Cloud pricing?", o: ["It's fully free", "The CSPM/Secure Score is free; enhanced workload-protection plans (servers, databases, storage, containers, etc.) are billed per resource", "It's only free for the first 30 days", "It's not available on Azure"], a: 1, d: "hard", e: "Free tier gives CSPM and Secure Score. Enhanced security (workload protection, threat detection) is per-resource, paid." },
  { q: "Which is TRUE about the interaction between Defender for Cloud and Sentinel?", o: ["Sentinel replaces Defender for Cloud", "They are complementary: Defender assesses posture and protects workloads; Sentinel is SIEM/SOAR ingesting Defender's alerts among many other sources", "They are identical", "Sentinel is only for AWS"], a: 1, d: "hard", e: "Defender = protect workloads + assess posture. Sentinel = SIEM/SOAR. Sentinel ingests Defender alerts and correlates them with other data." },
  { q: "Which of these is TRUE about the shared responsibility for security in Azure?", o: ["Azure secures the physical layer; customer secures the guest OS in IaaS, data, identity, and application layers", "Azure secures everything", "Customer secures everything", "Nobody secures the physical layer"], a: 0, d: "hard", e: "Azure handles physical / network / hypervisor security. Customer handles identity, data, apps, and (in IaaS) the guest OS." },
  { q: "Which is TRUE about the least-privilege principle in RBAC?", o: ["Always grant Owner", "Grant the lowest role and narrowest scope that lets the identity perform its job", "Everyone should be Reader", "Least privilege isn't relevant to cloud"], a: 1, d: "hard", e: "Least privilege = smallest set of permissions at the narrowest scope needed for the job. Reduces blast radius on compromise." },
  { q: "Which of these is a VALID method of accessing a resource in Entra ID without exposing credentials in app code?", o: ["Hard-code the password", "Managed identities — Azure-assigned service principal used by an Azure resource (like a VM or App Service) to authenticate to Entra ID", "Public IP allowlist", "SAS token in the URL"], a: 1, d: "hard", e: "Managed identities let Azure resources authenticate to Entra ID without any secrets in code. Highly recommended over stored credentials." },
  { q: "A user is BOTH assigned Reader at subscription level AND Owner at a specific RG. What is their effective access on that RG?", o: ["Reader (least is applied)", "Owner (highest is applied — RBAC is additive)", "None", "Contributor"], a: 1, d: "hard", e: "RBAC is additive — the highest permission wins. Owner at RG > Reader at subscription for that RG's resources." },
  { q: "The 'Contributor' role does NOT include which of the following?", o: ["Create resources", "Delete resources", "Modify resources", "Assign RBAC roles"], a: 3, d: "hard", e: "Contributor can create/modify/delete but cannot manage access assignments. That's Owner or User Access Administrator." }
];
</script>

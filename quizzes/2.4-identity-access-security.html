<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 2 · Architecture and services</span></div>
    <h1 class="q-title">Identity, access &amp; security</h1>
    <p class="q-subtitle">Entra ID, MFA, RBAC, Conditional Access, Zero Trust, Defender for Cloud.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>

      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>

    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>

    <div id="review"></div>

<script>
window.QUIZ_META = { title: "Identity, access & security", code: "2.4", domain: "Domain 2" };

window.QUIZ_QUESTIONS = [
  // EASY
  { q: "Microsoft Entra ID was formerly known as:", o: ["Windows Server Active Directory", "Azure Cloud Identity Service", "Microsoft Passport for Work", "Azure Active Directory"], a: 3, d: "easy", e: "Microsoft renamed Azure Active Directory to Microsoft Entra ID in 2023. Same service, new name." },
  { q: "Microsoft Entra ID is:", o: ["On-premises directory service for AD", "Managed cloud file storage service", "Cloud identity and access management", "Cloud-native monitoring and logging tool"], a: 2, d: "easy", e: "Entra ID is Microsoft's cloud identity platform for authentication, SSO, MFA, and access control." },
  { q: "Which protocols does Entra ID primarily use?", o: ["SSH, Telnet, or RDP protocols", "SMB, FTP, or NFS file protocols", "OAuth 2.0, OpenID Connect, SAML", "Kerberos, LDAP, or NTLM (legacy AD)"], a: 2, d: "easy", e: "Entra ID uses modern web identity protocols: OAuth 2.0, OpenID Connect, SAML. Not Kerberos/LDAP/NTLM." },
  { q: "Which service provides a managed AD DS-compatible experience (Kerberos, LDAP, Group Policy) in Azure?", o: ["Microsoft Entra Domain Services", "Microsoft Entra ID (P2 tier)", "Azure Bastion (RDP/SSH gateway)", "Azure Firewall (network filter)"], a: 0, d: "easy", e: "Entra Domain Services is managed AD DS in Azure — supports Kerberos, LDAP, NTLM, and Group Policy for legacy apps." },
  { q: "What does 'authentication' answer?", o: ["'What actions is the user permitted?'", "'Where is the sign-in coming from?'", "'Who is the user or workload here?'", "'When did the last sign-in occur?'"], a: 2, d: "easy", e: "Authentication = 'Who are you?'. Authorisation = 'What can you do?'." },
  { q: "What does 'authorisation' answer?", o: ["'Who is the user or workload here?'", "'What is the user permitted to do?'", "'Where is the sign-in coming from?'", "'How much does the resource cost?'"], a: 1, d: "easy", e: "Authorisation determines what an authenticated identity is allowed to do — usually via RBAC." },
  { q: "MFA requires at least how many different factor types?", o: ["1", "3", "4", "2"], a: 3, d: "easy", e: "MFA = multi-factor authentication — at least 2 of: something you know / have / are." },
  { q: "Which is a valid MFA factor category?", o: ["Something you own, borrow, or share", "Something you know, have, or are", "Password complexity, length, and history", "Location, time of day, and device"], a: 1, d: "easy", e: "Classic MFA categories: know (password/PIN), have (phone/key), are (biometric)." },
  { q: "Which of these is an example of PASSWORDLESS authentication?", o: ["A username plus a strong password", "SMS-based verification code", "Public IP allowlist and firewall rule", "Windows Hello / FIDO2 security key"], a: 3, d: "easy", e: "Passwordless removes the password entirely: Windows Hello (biometric/PIN), FIDO2 keys, Microsoft Authenticator." },
  { q: "SSO means:", o: ["Single Sign-On (one login, many apps)", "Simple Security Object (a certificate)", "Secure Socket Origin (a TLS setting)", "Single Server Operation (a scale mode)"], a: 0, d: "easy", e: "Single Sign-On: one authentication session unlocks access to multiple applications." },
  { q: "Which service lets external partners access resources with their own identities?", o: ["Entra External ID for B2C (customers)", "Entra External ID for B2B (guests)", "Azure Firewall with partner allowlist", "Entra Domain Services (managed AD)"], a: 1, d: "easy", e: "B2B (business-to-business) invites external users as guests. They keep their own identity; you grant them access." },
  { q: "Which service provides identity for customer-facing apps (customers sign up with social or local accounts)?", o: ["Entra External ID for B2C (consumers)", "Entra External ID for B2B (guests)", "Microsoft Entra Domain Services", "Azure Firewall with public rules"], a: 0, d: "easy", e: "B2C (business-to-consumer) is for consumer identity — customers sign up with email, Google, Facebook, etc." },
  { q: "Which RBAC role has FULL access AND can grant access to other users?", o: ["Contributor (creates and manages resources)", "User Access Administrator (RBAC only)", "Reader (view-only access to resources)", "Owner (full access, can grant to others)"], a: 3, d: "easy", e: "Owner has full management access AND the ability to grant access to others. Contributor cannot grant access." },
  { q: "Which RBAC role can manage everything except access?", o: ["Contributor (manages all except access)", "Owner (full access with grant rights)", "User Access Administrator (RBAC only)", "Reader (view-only access to resources)"], a: 0, d: "easy", e: "Contributor has full management access but CANNOT delegate/grant access. That's the Owner's distinctive power." },
  { q: "Which RBAC role can only view resources?", o: ["Reader (view-only, no modifications)", "Owner (full access, can grant to others)", "User Access Administrator (grants RBAC)", "Contributor (manages all except access)"], a: 0, d: "easy", e: "Reader can view but not modify. Ideal for auditors or read-only users." },
  { q: "Which RBAC role manages access assignments but not resources?", o: ["Contributor (creates and modifies resources)", "Owner (all resource and access rights)", "User Access Administrator (RBAC only)", "Reader (view-only access to resources)"], a: 2, d: "easy", e: "User Access Administrator (UAA) can grant/revoke RBAC assignments but has no direct resource management rights." },
  { q: "RBAC assignments are made at what scopes?", o: ["Only at the subscription level", "Only at the tenant/directory level", "MG → Subscription → RG → Resource", "Only at the individual resource level"], a: 2, d: "easy", e: "RBAC scopes: MG → Sub → RG → Resource. Permissions inherit down the hierarchy." },
  { q: "Zero Trust has how many core principles?", o: ["3", "1", "5", "7"], a: 0, d: "easy", e: "Zero Trust: (1) verify explicitly, (2) use least-privilege access, (3) assume breach." },
  { q: "Defense in depth has how many layers (per Microsoft's model)?", o: ["5", "7", "3", "10"], a: 1, d: "easy", e: "Seven layers: physical, identity &amp; access, perimeter, network, compute, application, data." },
  { q: "Which is Azure's Cloud Security Posture Management (CSPM) service that produces a Secure Score?", o: ["Microsoft Defender for Cloud", "Microsoft Sentinel (SIEM/SOAR)", "Azure Key Vault (secret storage)", "Azure Firewall (network filter)"], a: 0, d: "easy", e: "Defender for Cloud provides CSPM + workload protection. Secure Score tracks your posture as a percentage." },
  { q: "Which service is Azure's cloud-native SIEM/SOAR?", o: ["Azure Monitor (metrics and logs)", "Microsoft Sentinel (SIEM + SOAR)", "Azure Firewall (traffic filter)", "Defender for Cloud (CSPM/CWPP)"], a: 1, d: "easy", e: "Microsoft Sentinel is a cloud-native SIEM (Security Info &amp; Event Management) + SOAR (Security Orchestration Automation &amp; Response)." },
  { q: "Which service securely stores secrets, keys, and certificates?", o: ["Azure Blob Storage with a stored key", "Azure Firewall with cert bindings", "Azure Key Vault (managed HSM-backed)", "Defender for Cloud secure notes"], a: 2, d: "easy", e: "Azure Key Vault is Microsoft's managed secret / key / certificate store, with Entra ID-based access." },
  { q: "Azure DDoS Protection Basic:", o: ["Requires a Standard tier subscription", "Enabled by default, free on all public IPs", "Deprecated in favour of Azure Firewall", "A paid add-on billed per protected IP"], a: 1, d: "easy", e: "DDoS Basic is always on, free, and requires no configuration. Standard tier adds SLA, monitoring, cost protection, and integration with WAF." },
  { q: "Azure Firewall is:", o: ["A managed identity and access service", "A regional network load balancer", "A managed L4-L7 stateful firewall service", "A managed monitoring/logging tool"], a: 2, d: "easy", e: "Azure Firewall is a managed L4–L7 firewall with application rules (FQDN), network rules, and threat intelligence." },
  { q: "The Zero Trust principle 'Verify explicitly' means:", o: ["Encrypt everything, always, everywhere", "Only verify identity at initial login", "Trust internal network traffic implicitly", "Authenticate using all available signals"], a: 3, d: "easy", e: "Verify explicitly = re-authenticate/authorise using all relevant signals, every time. No implicit trust." },

  // MEDIUM
  { q: "A user has Contributor rights on a resource group. What can they NOT do?", o: ["Grant RBAC access to other users", "Create new virtual machines", "Modify existing resources", "Delete resources they created", "Redeploy from ARM templates"], a: 0, d: "medium", e: "Contributor can do everything except manage/grant access. That's the Owner or User Access Administrator role's job." },
  { q: "You want to require MFA only when a sign-in is risky (unfamiliar location, unfamiliar device). Best feature?", o: ["Configure risk-based Conditional Access", "Enable MFA globally for all users", "Rotate SAS tokens on high-risk apps", "Deploy Azure Firewall in front of app"], a: 0, d: "medium", e: "Conditional Access is exactly this — evaluate signals (risk, location, device) and apply MFA when needed." },
  { q: "A partner company needs access to a project resource group. Best approach?", o: ["Share the storage account key by email", "Create new Azure accounts for each user", "Give them the subscription owner password", "Invite them as B2B guests via External ID"], a: 3, d: "medium", e: "B2B lets partners bring their own identity. They authenticate with their own IdP; you assign them RBAC on your resources." },
  { q: "You want customers to sign up for your public web app using their Google or email accounts. Best service?", o: ["Entra External ID for B2C (consumers)", "Entra External ID for B2B (guests)", "Windows Server AD (on-prem forest)", "Entra Domain Services (managed AD DS)"], a: 0, d: "medium", e: "B2C is for consumer identity — social sign-in (Google, Facebook), local accounts, and consumer-scale identity flows." },
  { q: "Which is TRUE about the difference between authentication and authorisation?", o: ["Authentication is 'who'; authorisation is 'what'", "Both terms mean the same thing in Azure", "Authorisation happens before authentication does", "Only Owner-role users can be authorised"], a: 0, d: "medium", e: "Authentication = who you are. Authorisation = what you can do. Sequential steps." },
  { q: "You want a legacy app that requires LDAP and Kerberos to run in Azure without deploying domain controllers. Best fit?", o: ["Deploy Azure Firewall in front of app", "Use Azure Key Vault for credential store", "Entra ID Premium P2 with policies", "Entra Domain Services (managed AD DS)"], a: 3, d: "medium", e: "Entra Domain Services provides managed AD DS-compatible services (Kerberos, LDAP, Group Policy) without you managing domain controllers." },
  { q: "Windows Hello for Business is an example of:", o: ["SSO across multiple SaaS applications", "Passwordless auth (biometric or PIN via TPM)", "Kerberos ticket-granting with domain join", "MFA layered on top of a password"], a: 1, d: "medium", e: "Windows Hello for Business is passwordless — TPM-bound credential + biometric or PIN. Not just MFA (which still uses passwords)." },
  { q: "Which is TRUE about Conditional Access?", o: ["Included in Entra ID Free at full capacity", "Requires Entra ID P1 or higher licence", "It is a monitoring/reporting tool only", "It replaces RBAC for all resource permissions"], a: 1, d: "medium", e: "Full Conditional Access requires P1+. Free tier can only enable a simpler 'Security Defaults' preset." },
  { q: "Which of these is a Zero Trust principle?", o: ["Trust everything inside the firewall", "Encrypt only data in transit at rest", "Assume breach and design containment", "Trust devices joined to the domain", "Always allow administrator access"], a: 2, d: "medium", e: "Zero Trust: verify explicitly, least privilege, assume breach. 'Assume breach' means design so a compromise is contained." },
  { q: "An Application Security Group (ASG) is used to:", o: ["Provide managed DDoS protection to VMs", "Manage secrets, keys, and certificates", "Replace an NSG with application rules", "Group VMs by role for NSG rule targeting"], a: 3, d: "medium", e: "ASGs make NSG rules cleaner and less brittle — reference application roles instead of hard-coded IPs." },
  { q: "Which is TRUE about RBAC inheritance?", o: ["They inherit downward through the hierarchy", "They only apply at the exact assigned scope", "Only the Owner role is inheritable in RBAC", "RBAC does not support inheritance at all"], a: 0, d: "medium", e: "RBAC roles assigned at a higher scope automatically apply to everything below it." },
  { q: "Which is TRUE about Azure Policy vs RBAC?", o: ["They are alternatives — pick one or the other", "Azure Policy replaces RBAC for permissions", "Policy governs configs; RBAC governs identities", "RBAC is deprecated in favour of Azure Policy"], a: 2, d: "medium", e: "Policy = configuration governance. RBAC = identity permission. Complementary tools; both are enforced by ARM." },
  { q: "Which is BEST for storing an application's database connection string safely?", o: ["Azure Key Vault via managed identity", "Hard-coded string in the application code", "Environment variable checked into the repo", "Public blob storage with a short SAS"], a: 0, d: "medium", e: "Key Vault + managed identity is the recommended pattern — no secrets in code or config files." },
  { q: "You want detection of a suspected security incident using logs from Azure, AWS, on-prem, and third parties. Best service?", o: ["Defender for Cloud alone (workload only)", "Azure Monitor alone (metrics/logs only)", "Microsoft Sentinel (multi-source SIEM)", "Azure Firewall with threat intelligence"], a: 2, d: "medium", e: "Microsoft Sentinel is Azure's SIEM/SOAR — ingest logs from anywhere, detect with analytics + threat intel, automate response with playbooks." },
  { q: "Defender for Cloud's Secure Score does what?", o: ["Blocks malicious IPs at the network edge", "Encrypts data at rest across subscriptions", "Replaces Sentinel as the primary SIEM tool", "Scores your posture % with prioritised fixes"], a: 3, d: "medium", e: "Secure Score tracks your posture (0-100%) against best-practice recommendations. Higher score = fewer risky configurations." },
  { q: "You want to protect a specific critical VM from being deleted, even by owners, unless the lock is removed. Use:", o: ["Assign RBAC Reader role to everyone", "Apply a Delete lock on the resource", "Enable NSG blocking all inbound rules", "Enable disk encryption on the VM", "Move it to a separate subscription"], a: 1, d: "medium", e: "Resource locks (Delete or ReadOnly) apply on top of RBAC — even Owner cannot delete a locked resource without first removing the lock." },
  { q: "Which is TRUE about the layers of Defense in Depth?", o: ["Application is the outermost layer", "There are only three total layers", "Physical is outermost, data at core", "Data is the outermost layer of all", "Layers are not hierarchical at all"], a: 2, d: "medium", e: "Layers from outside in: Physical → Identity &amp; Access → Perimeter → Network → Compute → Application → Data." },
  { q: "Which of these is a valid Azure external identity offering?", o: ["Entra Outsider Access (guest module)", "Azure IdentitySpaces (partner tier)", "External RBAC role group set", "Entra External ID: B2B and B2C", "Entra Guest Portal cloud service"], a: 3, d: "medium", e: "Two flavours: B2B for partner/guest collaboration, B2C for customer-facing consumer identity." },
  { q: "Which is TRUE about NSGs (Network Security Groups)?", o: ["They are stateless firewall rules", "They apply only to virtual machines", "They cannot reference ASGs in rules", "They are stateful (return traffic allowed)"], a: 3, d: "medium", e: "NSGs are stateful — you don't need matching outbound rules for allowed inbound traffic." },
  { q: "Azure DDoS Protection Standard adds which over Basic?", o: ["Nothing new beyond the Basic tier", "Only free-tier features (encryption)", "Only encryption of packets in transit", "SLA, monitoring, cost protection, WAF"], a: 3, d: "medium", e: "Standard tier adds tuned protection, real-time mitigation reports, cost protection, and pairs with Application Gateway WAF." },
  { q: "Which is TRUE about Microsoft Sentinel?", o: ["Only ingests logs from native Azure sources", "A cloud firewall for east-west traffic", "It replaces Defender for Cloud entirely", "Only performs vulnerability scanning tasks", "Ingests Azure, multi-cloud, and on-prem logs"], a: 4, d: "medium", e: "Sentinel is a broad SIEM/SOAR — data connectors span multi-cloud, on-prem, and third-party sources." },
  { q: "Beyond 'something you know', 'something you have', and 'something you are', Microsoft lists a fourth MFA factor. What is it?", o: ["'Somewhere you are' (location)", "Something you configure yearly", "Someone you know as reference", "Something you always remember", "A hardware attestation report"], a: 0, d: "medium", e: "'Somewhere you are' — location, IP range, GPS. Conditional Access evaluates this signal to require MFA on unusual-location sign-ins." },
  { q: "Microsoft Entra ID is the identity plane for which of these?", o: ["Only for Azure subscription resources", "Only for on-prem enterprise workloads", "Only for Microsoft 365 mailboxes", "Azure, M365/Dynamics, and consumer services", "Only for Xbox and consumer accounts"], a: 3, d: "medium", e: "Entra ID is a shared identity plane across Azure, Microsoft 365 / Dynamics, and consumer Microsoft services — not Azure-only." },
  { q: "Which DDoS Protection tier includes ML-based adaptive tuning and SLA-backed cost protection during an attack?", o: ["Basic (free and always-on tier)", "Standard (or IP Protection Plans)", "Both Basic and Standard tiers do", "Neither tier includes this feature"], a: 1, d: "medium", e: "Standard tier adds ML-driven adaptive mitigation, attack analytics, WAF integration, and cost-protection SLA credits during a documented attack. Basic is free but minimal." },

  // HARD
  { q: "Which is TRUE about the distinction between Entra ID and Windows Server AD DS?", o: ["They are the same product, renamed", "AD DS is cloud-native; Entra ID is on-prem", "Entra ID fully supports Group Policy", "Both rely on Kerberos as primary protocol", "Entra: OAuth/OIDC (flat); AD DS: Kerberos (OUs)"], a: 4, d: "hard", e: "Entra ID is cloud-native, protocol-modern, flat structure. AD DS is traditional on-prem, protocol-legacy, hierarchical. Group Policy is AD DS only." },
  { q: "A user has Owner on subscription A and Reader on subscription B. Can they grant Contributor role to a colleague on subscription B?", o: ["Yes — Owner elsewhere grants globally", "Yes only for their own personal account", "No — Reader on B has no grant rights", "Only if Reader was scoped at tenant root"], a: 2, d: "hard", e: "RBAC assignments are per-scope. Reader on B doesn't give any granting powers on B, regardless of Owner elsewhere." },
  { q: "Which of the following describes a valid Zero Trust design choice?", o: ["Trust VMs inside the private network", "Disable auth for services behind firewall", "Grant broad admin rights to reduce friction", "Allow lateral movement inside the LAN", "Require MFA + device compliance on internal APIs"], a: 4, d: "hard", e: "Zero Trust means never trusting internal traffic implicitly. Every request is authenticated and authorised based on signals." },
  { q: "Which of these is TRUE about MFA vs passwordless?", o: ["MFA and passwordless are identical concepts", "Passwordless is a specific subset of MFA", "MFA layers factors; passwordless drops password", "MFA is a deprecated legacy approach today", "Passwordless requires exactly three factors"], a: 2, d: "hard", e: "MFA layers extra factors on top of a password. Passwordless removes the password. Passwordless methods are inherently strong-factor authentications." },
  { q: "Which of these is TRUE about the interaction of RBAC and resource locks?", o: ["Locks apply only to users in Reader role", "Locks apply universally, even to Owners", "Locks completely override RBAC (no access)", "Locks and RBAC do the exact same thing"], a: 1, d: "hard", e: "Locks apply to everyone regardless of role. To modify/delete a locked resource, remove the lock first — which requires 'Microsoft.Authorization/*' permission." },
  { q: "Which is TRUE about built-in RBAC roles?", o: ["100+ built-in roles plus custom roles", "Only Owner is usable in production", "There are exactly 4 built-in roles", "Custom roles are not supported at all", "Only Owner, Contributor, and Reader exist"], a: 0, d: "hard", e: "Azure has ~120+ built-in roles for granular scoping (e.g. Storage Blob Data Reader, SQL DB Contributor). Custom roles are also supported." },
  { q: "Which of the following is TRUE about Conditional Access?", o: ["It only checks the username and password", "It replaces RBAC for all permissions", "Evaluates signals → MFA/block/compliance", "It requires a physical hardware key"], a: 2, d: "hard", e: "Conditional Access is signal-driven policy at sign-in: identity + device + location + risk + workload → decision (allow / block / require MFA / restrict session)." },
  { q: "You want defense-in-depth for a critical web app. Which layered controls make sense?", o: ["Enable HTTPS on App Service only", "WAF + NSG + TLS + MI + Key Vault + encryption", "Public IP allowlist as sole control", "Rely on Defender for Cloud alerts alone", "Enable Azure Firewall only for egress"], a: 1, d: "hard", e: "Defense in depth = layered controls at each layer (identity, perimeter, network, compute, app, data). Any one control could fail, but not all at once." },
  { q: "Which is TRUE about Defender for Cloud pricing?", o: ["Defender for Cloud is fully free of charge", "Free only for the first 30-day trial", "It is not available on Azure at all", "CSPM free; workload plans billed per resource", "Requires E5 Microsoft 365 licence per user"], a: 3, d: "hard", e: "Free tier gives CSPM and Secure Score. Enhanced security (workload protection, threat detection) is per-resource, paid." },
  { q: "Which is TRUE about the interaction between Defender for Cloud and Sentinel?", o: ["Sentinel entirely replaces Defender for Cloud", "Defender protects workloads; Sentinel is SIEM", "They are identical services with two names", "Sentinel is exclusively for AWS environments"], a: 1, d: "hard", e: "Defender = protect workloads + assess posture. Sentinel = SIEM/SOAR. Sentinel ingests Defender alerts and correlates them with other data." },
  { q: "Which of these is TRUE about the shared responsibility for security in Azure?", o: ["Azure secures the entire stack for the customer", "Customer secures everything, Azure secures nothing", "Azure: physical; customer: OS/data/identity/app", "Neither party secures the physical layer", "Both parties equally secure every layer"], a: 2, d: "hard", e: "Azure handles physical / network / hypervisor security. Customer handles identity, data, apps, and (in IaaS) the guest OS." },
  { q: "Which is TRUE about the least-privilege principle in RBAC?", o: ["Always grant Owner role for simplicity", "Grant lowest role at narrowest scope needed", "Everyone should be assigned Reader only", "Not applicable to cloud infrastructure"], a: 1, d: "hard", e: "Least privilege = smallest set of permissions at the narrowest scope needed for the job. Reduces blast radius on compromise." },
  { q: "Which of these is a VALID method of accessing a resource in Entra ID without exposing credentials in app code?", o: ["Hard-code the password in the source", "Use a public IP allowlist as auth", "Managed identity (Azure-assigned SP)", "SAS token embedded in the request URL"], a: 2, d: "hard", e: "Managed identities let Azure resources authenticate to Entra ID without any secrets in code. Highly recommended over stored credentials." },
  { q: "A user is BOTH assigned Reader at subscription level AND Owner at a specific RG. What is their effective access on that RG?", o: ["Reader (least privilege wins)", "Owner (highest privilege wins — additive)", "Contributor (average of the two)", "No effective access is granted at all"], a: 1, d: "hard", e: "RBAC is additive — the highest permission wins. Owner at RG &gt; Reader at subscription for that RG's resources." },
  { q: "The 'Contributor' role does NOT include which of the following?", o: ["Create resources of any type", "Delete resources at will", "Modify existing resources", "Assign RBAC roles to others"], a: 3, d: "hard", e: "Contributor can create/modify/delete but cannot manage access assignments. That's Owner or User Access Administrator." }
];
</script>
<script src="quiz.js"></script>
</body>
</html>

<!DOCTYPE html>

  <meta charset="UTF-8">

  <title>2.2 Compute &amp; networking · AZ-900 quiz</title>

<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 2 · Architecture and services</span></div>
    <h1 class="q-title">Compute &amp; networking</h1>
    <p class="q-subtitle">VMs, containers, App Service, Functions, VNets, gateways, load balancers.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
      <div class="feedback" id="feedback"><div class="feedback-verdict" id="feedback-verdict"></div><div class="feedback-explanation" id="feedback-explanation"></div></div>
      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>
  </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>

    <div id="review"></div>
  </div>

</div>

<script>
window.QUIZ_META = { title: "Compute & networking", code: "2.2", domain: "Domain 2" };

window.QUIZ_QUESTIONS = [
  // ============ EASY ============
  { q: "Azure Virtual Machines are an example of which service model?", o: ["IaaS", "PaaS", "SaaS", "Serverless"], a: 0, d: "easy", e: "Azure VMs are IaaS — you get virtualised infrastructure and manage the guest OS up." },
  { q: "What is a Virtual Machine Scale Set (VMSS)?", o: ["A single powerful VM", "A group of identical, load-balanced VMs that auto-scale together", "A backup service for VMs", "A serverless product"], a: 1, d: "easy", e: "VMSS lets you deploy and manage many identical VMs with autoscale, auto-heal, and load balancing." },
  { q: "Which is TRUE about Azure App Service?", o: ["It is IaaS", "It is PaaS for hosting web apps, APIs, and mobile back-ends", "It only supports .NET", "It has no autoscale"], a: 1, d: "easy", e: "App Service is a fully managed PaaS for web apps in many languages (.NET, Java, Node, Python, PHP, Ruby, containers)." },
  { q: "What is Azure Container Instances (ACI)?", o: ["Managed Kubernetes", "A single-container serverless service — fastest way to run a container in Azure", "A container registry", "A VM extension"], a: 1, d: "easy", e: "ACI runs a single container quickly with per-second billing — no orchestrator required." },
  { q: "Azure Kubernetes Service (AKS) is:", o: ["An IaaS product", "A managed Kubernetes service — Microsoft manages the control plane", "The same as Docker", "A serverless compute service"], a: 1, d: "easy", e: "AKS is Microsoft's managed Kubernetes. The control plane is free and managed by Microsoft; you manage the node pools." },
  { q: "Azure Functions is best classified as:", o: ["IaaS", "PaaS-serverless (event-driven, per-execution billing)", "SaaS", "A database"], a: 1, d: "easy", e: "Functions is Microsoft's flagship serverless compute — event-triggered, pay-per-execution, scale-to-zero." },
  { q: "What is Azure Virtual Desktop (AVD)?", o: ["A game streaming service", "A desktop-as-a-service — Windows desktops delivered from Azure", "A database service", "A load balancer"], a: 1, d: "easy", e: "AVD delivers Windows desktops and apps from Azure. Multi-session Windows Enterprise is supported." },
  { q: "What is an Azure Virtual Network (VNet)?", o: ["A physical fibre connection", "An isolated IP address space in Azure — your private network in the cloud", "A public internet gateway", "A DNS service"], a: 1, d: "easy", e: "A VNet is a logically isolated IP address space in Azure. It's regional and can be subdivided into subnets." },
  { q: "What is a subnet in Azure?", o: ["A pricing category", "A range of IP addresses within a VNet's address space", "A subscription boundary", "A VM SKU"], a: 1, d: "easy", e: "A subnet is a subdivision of a VNet's IP space, into which resources like VMs, gateways, or private endpoints are placed." },
  { q: "What is VNet peering?", o: ["A public internet connection", "A private connection between two VNets over the Microsoft backbone", "A backup service", "A load balancer"], a: 1, d: "easy", e: "Peering privately connects two VNets over the Microsoft backbone. Can be local (same region) or global (across regions)." },
  { q: "What does a Network Security Group (NSG) do?", o: ["Encrypts data at rest", "Provides allow/deny rules for traffic to a subnet or NIC", "Creates virtual machines", "Sends alerts"], a: 1, d: "easy", e: "NSGs are stateful allow/deny rule sets applied at the subnet or NIC level." },
  { q: "Azure VPN Gateway carries traffic over:", o: ["A private circuit", "The public internet, encrypted", "Fibre channel", "Bluetooth"], a: 1, d: "easy", e: "VPN Gateway creates an encrypted tunnel *over the public internet* between on-prem or clients and Azure." },
  { q: "Azure ExpressRoute carries traffic over:", o: ["The public internet", "A private circuit through a connectivity partner", "Wi-Fi", "Satellite"], a: 1, d: "easy", e: "ExpressRoute is a *private* connection to Azure through a connectivity partner — no public internet involved." },
  { q: "Azure Load Balancer operates at which OSI layer?", o: ["L2", "L4 (transport)", "L7 (application)", "L3"], a: 1, d: "easy", e: "Azure Load Balancer is an L4 (TCP/UDP) load balancer." },
  { q: "Application Gateway operates at which OSI layer?", o: ["L4", "L7 (application, HTTP/S)", "L2", "L3"], a: 1, d: "easy", e: "Application Gateway is an L7 (HTTP/S) load balancer with URL routing, TLS termination, and optional WAF." },
  { q: "Which service is a GLOBAL L7 load balancer with CDN and WAF?", o: ["Azure Load Balancer", "Application Gateway", "Azure Front Door", "Traffic Manager"], a: 2, d: "easy", e: "Azure Front Door is Microsoft's global L7 entry — HTTP/S routing, CDN, and WAF at the edge." },
  { q: "Which service routes traffic using DNS for global distribution?", o: ["Load Balancer", "Application Gateway", "Azure Front Door", "Traffic Manager"], a: 3, d: "easy", e: "Traffic Manager is a DNS-based traffic-routing service — clients resolve to the best endpoint per its policy." },
  { q: "Which Azure service hosts public DNS zones?", o: ["Azure DNS", "Azure Firewall", "Azure Monitor", "Azure Front Door"], a: 0, d: "easy", e: "Azure DNS is a fully managed DNS hosting service for public (and private) zones." },
  { q: "The 'stopped' vs 'stopped-deallocated' VM state difference is:", o: ["Stopped bills for compute; deallocated does not", "They mean the same thing", "Deallocated bills; stopped does not", "Both stop all billing"], a: 0, d: "easy", e: "Stopped (from within the OS): still billed for compute. Stopped-deallocated (from Portal/CLI): compute is not billed, storage still is." },
  { q: "Which is TRUE about a resource in a VNet?", o: ["It has no private IP", "It has a private IP inside the subnet's range", "It cannot access other resources in the same VNet", "It must have a public IP"], a: 1, d: "easy", e: "Resources in a subnet get a private IP from that subnet's range. Public IPs are optional add-ons." },
  { q: "Which is FALSE about Availability Sets?", o: ["They distribute VMs across fault domains", "They distribute VMs across update domains", "They span multiple regions", "They provide a 99.95% VM SLA"], a: 2, d: "easy", e: "Availability Sets are within a single datacentre. Multi-region deployment is a different pattern." },
  { q: "Which service model does Azure Functions on the Consumption plan represent?", o: ["IaaS", "Serverless PaaS", "SaaS", "On-prem"], a: 1, d: "easy", e: "Consumption plan = truly serverless: scale to zero, pay per execution." },
  { q: "How many availability zones does a zone-enabled Azure region have (minimum)?", o: ["1", "2", "3", "5"], a: 2, d: "easy", e: "Minimum 3 physically separate availability zones per zone-enabled region." },

  // ============ MEDIUM ============
  { q: "You need to lift-and-shift a legacy Windows Server 2008 app with no code changes. Best fit?", o: ["Azure Functions", "Azure App Service", "Azure Virtual Machines (IaaS)", "Azure Container Instances"], a: 2, d: "medium", e: "IaaS VM is the classic 'rehost' target for legacy apps that need specific OS or drivers." },
  { q: "You want to deploy a Python API with automatic scaling, deployment slots, and no OS to manage. Best fit?", o: ["Azure Virtual Machines", "Azure App Service", "AKS", "Azure Functions consumption plan"], a: 1, d: "medium", e: "App Service is the PaaS sweet spot — managed OS, auto-scale, deployment slots, first-class CI/CD." },
  { q: "A small piece of code should run on new blob uploads. Best fit?", o: ["Azure Virtual Machines", "Azure App Service Standard tier", "Azure Functions (event-triggered on blob)", "AKS"], a: 2, d: "medium", e: "Functions with a Blob trigger fits perfectly — pay per execution, no infrastructure to size." },
  { q: "You need a managed Kubernetes cluster with self-managed node pools. Best fit?", o: ["Azure VMs", "AKS (Azure Kubernetes Service)", "Azure Container Instances", "App Service"], a: 1, d: "medium", e: "AKS is the managed Kubernetes offering — the K8s control plane is managed; node pools are yours." },
  { q: "You need a fire-and-forget container to run for 20 minutes, no orchestrator. Best fit?", o: ["AKS", "Azure Virtual Machines", "Azure Container Instances (ACI)", "Azure Functions"], a: 2, d: "medium", e: "ACI is single-container, serverless, per-second billing — perfect for fire-and-forget or batch container work." },
  { q: "A workload of stateless microservices needs KEDA-driven autoscale without deploying Kubernetes yourself. Best fit?", o: ["Azure Container Apps", "AKS", "IaaS VMs", "App Service Standard tier"], a: 0, d: "medium", e: "Container Apps is built on Kubernetes + KEDA + Dapr but abstracts the cluster — ideal for stateless microservices at scale." },
  { q: "You want a private connection from your on-prem datacentre to Azure that doesn't touch the public internet, with 10 Gbps and low latency. Choose:", o: ["VPN Gateway", "ExpressRoute", "Azure Front Door", "Traffic Manager"], a: 1, d: "medium", e: "ExpressRoute is a private circuit — no public internet, higher bandwidth, better SLA." },
  { q: "Two employees need to connect to Azure resources from their laptops securely from home. Best option?", o: ["ExpressRoute (private circuit)", "Point-to-site (P2S) VPN", "Public IP exposure with firewall", "Traffic Manager"], a: 1, d: "medium", e: "P2S VPN gives individual clients an encrypted tunnel to Azure — ideal for remote workers." },
  { q: "You want to distribute HTTP traffic across two regions of a web app with URL-path routing and WAF. Best service?", o: ["Azure Load Balancer", "Application Gateway", "Azure Front Door", "Traffic Manager alone"], a: 2, d: "medium", e: "Front Door is L7 global with URL routing and WAF — the right tool for global HTTP with intelligent routing." },
  { q: "You need to load-balance TCP traffic among VMs in a single region. Best service?", o: ["Azure Load Balancer (L4)", "Application Gateway", "Traffic Manager", "Front Door"], a: 0, d: "medium", e: "L4 traffic + regional scope = Azure Load Balancer." },
  { q: "You need URL-based routing and TLS termination for a regional HTTP app. Best service?", o: ["Load Balancer", "Application Gateway", "Traffic Manager", "Front Door"], a: 1, d: "medium", e: "Application Gateway is L7 regional — URL routing, TLS termination, optional WAF." },
  { q: "You have failover to a secondary region with weighted DNS routing. Best service?", o: ["Load Balancer", "Application Gateway", "Traffic Manager", "Front Door in DNS-only mode"], a: 2, d: "medium", e: "Traffic Manager is DNS-based global routing — priority, weighted, performance, geographic policies." },
  { q: "Two VNets in different regions need private connectivity. Best option?", o: ["Public internet", "Global VNet peering", "Traffic Manager", "Load Balancer"], a: 1, d: "medium", e: "Global VNet peering connects VNets across regions over the Microsoft backbone privately." },
  { q: "You want private-IP access from your VNet to a specific Azure SQL Database instance. Which is best?", o: ["Public endpoint with firewall", "Service endpoint", "Private endpoint", "Traffic Manager"], a: 2, d: "medium", e: "Private endpoints give a specific PaaS instance a private IP inside your VNet — the most secure option." },
  { q: "Which is TRUE about VMSS?", o: ["It cannot autoscale", "It provides horizontal scale-out and self-healing across many identical VMs", "It is the same as Availability Set", "It only supports Windows"], a: 1, d: "medium", e: "VMSS is horizontal scale for identical VMs — auto-scale, auto-heal, integrates with LB or App Gateway." },
  { q: "Which of these is a HORIZONTAL scaling action?", o: ["Resize a VM from D2 to D8", "Add three more VMs to a VMSS", "Change disk from Standard to Premium", "Move a VM to another region"], a: 1, d: "medium", e: "Adding more instances = horizontal scaling (scale out)." },
  { q: "Which of these is a VERTICAL scaling action?", o: ["Add more VMs to a scale set", "Resize a VM to a larger SKU", "Deploy to another region", "Add a load balancer"], a: 1, d: "medium", e: "Resizing (up or down) = vertical scaling." },
  { q: "The default number of fault domains in an Availability Set is:", o: ["2", "3", "5", "10"], a: 1, d: "medium", e: "Default is 3 fault domains and 5 update domains (configurable)." },
  { q: "A VMSS delivers what kind of scaling?", o: ["Vertical scaling only", "Horizontal scaling (with autoscale)", "Region-level scaling only", "Manual only"], a: 1, d: "medium", e: "VMSS = horizontal scaling of identical VMs, with optional autoscale rules." },
  { q: "Which service enables L7 HTTP routing to multiple Azure regions?", o: ["Load Balancer", "Application Gateway", "Azure Front Door", "ExpressRoute"], a: 2, d: "medium", e: "Front Door is L7 global — used for multi-region HTTP entry with WAF and CDN." },
  { q: "Which is TRUE about NSGs?", o: ["They are stateless", "They are stateful — return traffic is automatically allowed", "They can only be applied to subnets", "They can only be applied to NICs"], a: 1, d: "medium", e: "NSGs are stateful. Return traffic to allowed inbound is allowed automatically. They can be applied to subnets or NICs." },
  { q: "Which is TRUE about Application Security Groups (ASGs)?", o: ["They replace NSGs", "They group VMs by application role for cleaner NSG rules", "They are a DNS service", "They handle encryption"], a: 1, d: "medium", e: "ASGs let you write NSG rules against a role (like 'WebServers') instead of hard-coded IPs, making rules more maintainable." },
  { q: "Which connectivity option provides the HIGHEST bandwidth to Azure?", o: ["VPN Gateway", "ExpressRoute (up to 100 Gbps)", "Traffic Manager", "Azure Front Door"], a: 1, d: "medium", e: "ExpressRoute supports circuits up to 100 Gbps — far above what VPN Gateway can provide." },
  { q: "Which is TRUE about Azure Functions on the Consumption plan?", o: ["It cannot scale to zero", "It scales to zero when idle and bills per execution", "It requires a Dedicated App Service Plan", "It only supports .NET"], a: 1, d: "medium", e: "Consumption plan is serverless — scales to zero when idle, bills per execution + resource used." },
  { q: "Deployment slots in Azure App Service are used for:", o: ["Backups", "Staging environments with swap-to-production capability", "Region failover", "Cost savings"], a: 1, d: "medium", e: "Deployment slots let you deploy to a staging slot, warm it up, and swap to production with zero downtime." },
  { q: "You have a small dev VM that you use during business hours only. To minimize cost, what should you do at 6pm?", o: ["Delete the VM", "Stop-deallocate the VM (compute stops billing; disk is retained)", "Restart it", "Leave it running"], a: 1, d: "medium", e: "Stop-deallocating releases the VM from the host — compute stops billing while disk is retained." },

  { q: "You need Azure Firewall to allow outbound traffic to *.microsoft.com. Which rule type do you use?", o: ["Network rule", "Application rule (FQDN)", "NAT rule", "Route table"], a: 1, d: "medium", e: "Application rules match on FQDN and support wildcards like *.microsoft.com. Network rules match on IP/port; NAT rules do inbound DNAT." },
  { q: "Which Azure Firewall tier adds IDPS (intrusion detection & prevention) and TLS inspection?", o: ["Basic", "Standard", "Premium", "Ultra"], a: 2, d: "medium", e: "Premium adds IDPS, TLS inspection, URL filtering, and web categories. Standard has core stateful rules; Basic targets SMB." },

  // ============ HARD ============
  { q: "You have two peered VNets (A ↔ B). VNet C is peered with B but not with A. Can VNet A talk to VNet C directly through B?", o: ["Yes, peering is transitive", "No, VNet peering is NOT transitive by default — traffic won't flow A → B → C", "Only if all VNets are in one region", "Only if a VPN Gateway is used"], a: 1, d: "hard", e: "VNet peering is non-transitive. A hub-and-spoke design uses a VPN Gateway or Firewall in the hub to route between spokes." },
  { q: "Which is TRUE about Front Door vs Application Gateway?", o: ["Both are global; both are regional", "Front Door is global, Application Gateway is regional; Front Door often sits *in front of* Application Gateway", "They are the same product", "Application Gateway is only for internal apps"], a: 1, d: "hard", e: "Front Door is global L7. Application Gateway is regional L7. A common pattern: Front Door → Application Gateway → backend." },
  { q: "A VM in Availability Set with 3 fault domains and 5 update domains — how many combinations does Azure spread its VMs across?", o: ["3", "5", "8", "15"], a: 3, d: "hard", e: "Fault × Update = 3 × 5 = 15 combinations. VMs are spread across these combinations." },
  { q: "Which is TRUE about the SLA for a VM in an Availability Zone deployment?", o: ["It's the same as a single VM (99.9%)", "Requires ≥ 2 VMs across ≥ 2 zones for the 99.99% SLA", "AZ deployment has no SLA", "Only applies to Premium SSD"], a: 1, d: "hard", e: "You need 2+ VMs across 2+ zones to get 99.99%. A single VM (even 'in a zone') still gets the single-VM SLA." },
  { q: "Which is TRUE about ExpressRoute security?", o: ["It's encrypted by default at the network layer", "It does NOT provide encryption by default — customers can add MACsec or IPsec if needed", "It's less secure than VPN", "It cannot carry sensitive data"], a: 1, d: "hard", e: "ExpressRoute provides a private circuit, not encryption by default. It's private, but if you need encryption you add IPsec on top." },
  { q: "You need to failover HTTP traffic to another region if the primary region's health check fails, with the lowest latency for users. Which service?", o: ["Azure Load Balancer", "Application Gateway", "Azure Front Door", "Traffic Manager with performance policy"], a: 2, d: "hard", e: "Front Door offers instant edge-based failover using health probes at Microsoft's PoPs — faster failover than DNS-based Traffic Manager." },
  { q: "Which is a valid difference between Traffic Manager and Front Door?", o: ["They are identical", "Traffic Manager is DNS-based (client caches DNS TTL); Front Door is anycast HTTP entry with faster failover", "Front Door is DNS-only", "Traffic Manager is regional; Front Door is regional"], a: 1, d: "hard", e: "Traffic Manager routes via DNS (subject to TTL). Front Door is a full anycast HTTP proxy at the edge — faster and more granular." },
  { q: "Which of these is TRUE about the AKS control plane?", o: ["It runs on customer VMs", "The control plane is managed by Microsoft and is free; only nodes are billed", "You must patch it manually", "It requires ExpressRoute"], a: 1, d: "hard", e: "AKS control plane is free and managed by Microsoft. You pay only for the node pools (VMs) and any other Azure resources they use." },
  { q: "Which service is BEST for hosting a static website with global low-latency delivery?", o: ["Azure Load Balancer only", "Azure Storage (static website) + Azure Front Door for global caching", "Azure Kubernetes Service", "Azure Functions"], a: 1, d: "hard", e: "Blob Storage's static website hosting + Front Door as global CDN/entry is a classic low-cost global static site." },
  { q: "Which is TRUE about VNet peering pricing?", o: ["Peering is free", "Local peering has a low per-GB charge; global peering costs more per GB", "Only global peering has a charge", "Peering is only free within the same subscription"], a: 1, d: "hard", e: "Peering has per-GB inbound and outbound charges, higher for cross-region (global) peering." },
  { q: "In which scenario is Azure Firewall PREFERRED over an NSG?", o: ["Simple allow/deny between subnets", "Centralised FQDN filtering, application rules, and threat intelligence-based blocking across multiple VNets", "Encrypting data at rest", "Load balancing HTTP"], a: 1, d: "hard", e: "Azure Firewall is a full managed L4–L7 firewall — FQDN filtering, threat intelligence, and central management across VNets. NSGs are basic L3/L4 allow/deny." },
  { q: "Which of these is TRUE about Azure Bastion?", o: ["It's a VPN service", "It provides secure RDP/SSH access to VMs via the Azure Portal, without needing public IPs on VMs", "It replaces NSGs", "It's a load balancer"], a: 1, d: "hard", e: "Azure Bastion provides secure browser-based RDP/SSH access to VMs without exposing them via public IPs — improves the security posture." },
  { q: "You need to run a workload for 30 minutes at extremely low cost, and it can be interrupted at any time. Best VM pricing option?", o: ["Reserved Instance", "Spot VMs (up to 90% discount, evictable)", "Standard pay-as-you-go", "Hybrid Benefit"], a: 1, d: "hard", e: "Spot VMs offer up to 90% discount but can be evicted with 30-second notice. Perfect for interruptible batch work." },
  { q: "Which service is BEST described as: managed containers with per-second billing, no orchestrator, single container per instance?", o: ["AKS", "Azure Container Instances (ACI)", "Azure Container Apps", "App Service"], a: 1, d: "hard", e: "ACI is fire-and-forget single-container hosting with per-second billing — no orchestrator required." },
  { q: "Two Azure services provide L7 load balancing but at different scopes. Which pairing is correct?", o: ["Load Balancer is L7, Application Gateway is L4", "Application Gateway is L7 regional; Front Door is L7 global", "Front Door is L4, Traffic Manager is L7", "Only Load Balancer is L7"], a: 1, d: "hard", e: "Application Gateway = L7 regional. Front Door = L7 global. Both are HTTP/S-aware; scope differs." },
  { q: "You want to expose a private backend to a public IP:port on Azure Firewall via DNAT. Which rule type?", o: ["Application rule", "Network rule", "NAT rule", "Route table"], a: 2, d: "hard", e: "NAT rules translate an inbound public IP:port to a backend private IP:port (DNAT). Application/Network rules are for outbound and east-west traffic control." }
];
</script>
<script src="quiz.js"></script>
</body>
</html>

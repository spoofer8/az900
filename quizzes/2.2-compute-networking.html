      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>

<script>
window.QUIZ_META = { title: "Compute & networking", code: "2.2", domain: "Domain 2" };

window.QUIZ_QUESTIONS = [
  // ============ EASY ============
  { q: "Azure Virtual Machines are an example of which service model?", o: ["IaaS", "PaaS", "SaaS", "Serverless"], a: 0, d: "easy", e: "Azure VMs are IaaS — you get virtualised infrastructure and manage the guest OS up." },
  { q: "What is a Virtual Machine Scale Set (VMSS)?", o: ["A single high-performance VM SKU", "A backup and recovery service for VMs", "A serverless product for functions", "Identical VMs that auto-scale together"], a: 3, d: "easy", e: "VMSS lets you deploy and manage many identical VMs with autoscale, auto-heal, and load balancing." },
  { q: "Which is TRUE about Azure App Service?", o: ["PaaS for hosting web apps and APIs", "IaaS for building custom web servers", "PaaS that only supports .NET apps", "PaaS with no autoscale capability"], a: 0, d: "easy", e: "App Service is a fully managed PaaS for web apps in many languages (.NET, Java, Node, Python, PHP, Ruby, containers)." },
  { q: "What is Azure Container Instances (ACI)?", o: ["Managed Kubernetes with autoscale", "Serverless single-container hosting", "A registry for container images", "A VM extension that installs Docker"], a: 1, d: "easy", e: "ACI runs a single container quickly with per-second billing — no orchestrator required." },
  { q: "Azure Kubernetes Service (AKS) is:", o: ["An IaaS product for self-hosting K8s", "The container runtime made by Docker", "Managed Kubernetes with a hosted control plane", "A serverless per-request compute service"], a: 2, d: "easy", e: "AKS is Microsoft's managed Kubernetes. The control plane is free and managed by Microsoft; you manage the node pools." },
  { q: "Azure Functions is best classified as:", o: ["IaaS with autoscale rules", "A SaaS productivity tool", "A managed database service", "Serverless PaaS with per-execution billing"], a: 3, d: "easy", e: "Functions is Microsoft's flagship serverless compute — event-triggered, pay-per-execution, scale-to-zero." },
  { q: "What is Azure Virtual Desktop (AVD)?", o: ["Windows desktop-as-a-service from Azure", "A cloud game streaming service for consumers", "A managed relational database service", "A regional HTTP load balancer service"], a: 0, d: "easy", e: "AVD delivers Windows desktops and apps from Azure. Multi-session Windows Enterprise is supported." },
  { q: "What is an Azure Virtual Network (VNet)?", o: ["A physical fibre connection to Azure", "An isolated IP address space in Azure", "A public gateway for internet egress", "A fully managed public DNS hosting service"], a: 1, d: "easy", e: "A VNet is a logically isolated IP address space in Azure. It's regional and can be subdivided into subnets." },
  { q: "What is a subnet in Azure?", o: ["A billing category for VM sizes", "A subscription-level trust boundary", "An IP address range within a VNet", "A VM SKU family and generation"], a: 2, d: "easy", e: "A subnet is a subdivision of a VNet's IP space, into which resources like VMs, gateways, or private endpoints are placed." },
  { q: "What is VNet peering?", o: ["A public internet connection to on-prem", "A backup service for VNet configs", "A regional load balancer for VNets", "A private connection between two VNets"], a: 3, d: "easy", e: "Peering privately connects two VNets over the Microsoft backbone. Can be local (same region) or global (across regions)." },
  { q: "What does a Network Security Group (NSG) do?", o: ["Applies allow/deny rules to subnets or NICs", "Encrypts data at rest on managed disks", "Creates and configures virtual machines", "Sends notification alerts on metric spikes"], a: 0, d: "easy", e: "NSGs are stateful allow/deny rule sets applied at the subnet or NIC level." },
  { q: "Azure VPN Gateway carries traffic over:", o: ["A dedicated private fibre circuit", "The public internet, IPsec encrypted", "A fibre channel storage network", "A Bluetooth low-energy IoT channel"], a: 1, d: "easy", e: "VPN Gateway creates an encrypted tunnel *over the public internet* between on-prem or clients and Azure." },
  { q: "Azure ExpressRoute carries traffic over:", o: ["Encrypted tunnels over the public internet", "Consumer Wi-Fi and cellular networks", "A private circuit via a connectivity partner", "A dedicated satellite uplink service"], a: 2, d: "easy", e: "ExpressRoute is a *private* connection to Azure through a connectivity partner — no public internet involved." },
  { q: "Azure Load Balancer operates at which OSI layer?", o: ["L2 (data link)", "L4 (transport)", "L7 (application)", "L3 (network)"], a: 1, d: "easy", e: "Azure Load Balancer is an L4 (TCP/UDP) load balancer." },
  { q: "Application Gateway operates at which OSI layer?", o: ["L7 (application, HTTP/S)", "L4 (transport, TCP/UDP)", "L2 (data link)", "L3 (network)"], a: 0, d: "easy", e: "Application Gateway is an L7 (HTTP/S) load balancer with URL routing, TLS termination, and optional WAF." },
  { q: "Which service is a GLOBAL L7 load balancer with CDN and WAF?", o: ["Azure Load Balancer (L4 regional)", "Application Gateway (L7 regional)", "Azure Front Door (L7 global)", "Traffic Manager (DNS routing)"], a: 2, d: "easy", e: "Azure Front Door is Microsoft's global L7 entry — HTTP/S routing, CDN, and WAF at the edge." },
  { q: "Which service routes traffic using DNS for global distribution?", o: ["Azure Load Balancer (L4 regional)", "Application Gateway (L7 regional)", "Azure Front Door (L7 anycast)", "Traffic Manager (DNS routing)"], a: 3, d: "easy", e: "Traffic Manager is a DNS-based traffic-routing service — clients resolve to the best endpoint per its policy." },
  { q: "Which Azure service hosts public DNS zones?", o: ["Azure Firewall", "Azure DNS", "Azure Monitor", "Azure Front Door"], a: 1, d: "easy", e: "Azure DNS is a fully managed DNS hosting service for public (and private) zones." },
  { q: "The 'stopped' vs 'stopped-deallocated' VM state difference is:", o: ["They mean the same thing exactly", "Both stop all billing on the VM entirely", "Stopped bills compute; deallocated does not", "Deallocated bills compute; stopped does not"], a: 2, d: "easy", e: "Stopped (from within the OS): still billed for compute. Stopped-deallocated (from Portal/CLI): compute is not billed, storage still is." },
  { q: "Which is TRUE about a resource in a VNet?", o: ["Has no private IP address by default", "Cannot reach other resources in same VNet", "Must have a public IP address assigned", "Gets a private IP from its subnet's range"], a: 3, d: "easy", e: "Resources in a subnet get a private IP from that subnet's range. Public IPs are optional add-ons." },
  { q: "Which is FALSE about Availability Sets?", o: ["They distribute VMs across fault domains", "They distribute VMs across update domains", "They span multiple regions automatically", "They provide a 99.95% VM uptime SLA"], a: 2, d: "easy", e: "Availability Sets are within a single datacentre. Multi-region deployment is a different pattern." },
  { q: "Which service model does Azure Functions on the Consumption plan represent?", o: ["Serverless PaaS", "IaaS", "SaaS", "On-prem"], a: 0, d: "easy", e: "Consumption plan = truly serverless: scale to zero, pay per execution." },
  { q: "How many availability zones does a zone-enabled Azure region have (minimum)?", o: ["1", "2", "3", "5"], a: 2, d: "easy", e: "Minimum 3 physically separate availability zones per zone-enabled region." },

  // ============ MEDIUM ============
  { q: "You need to lift-and-shift a legacy Windows Server 2008 app with no code changes. Best fit?", o: ["Azure Functions consumption plan", "Azure App Service Windows plan", "Azure Container Instances (ACI)", "Azure Kubernetes Service (AKS)", "Azure Virtual Machines (IaaS)"], a: 4, d: "medium", e: "IaaS VM is the classic 'rehost' target for legacy apps that need specific OS or drivers." },
  { q: "You want to deploy a Python API with automatic scaling, deployment slots, and no OS to manage. Best fit?", o: ["Azure Virtual Machines with Nginx", "AKS with managed node pools", "Azure Functions consumption plan", "Azure Container Instances (ACI)", "Azure App Service (Linux)"], a: 4, d: "medium", e: "App Service is the PaaS sweet spot — managed OS, auto-scale, deployment slots, first-class CI/CD." },
  { q: "A small piece of code should run on new blob uploads. Best fit?", o: ["Azure Virtual Machines with polling script", "Azure App Service Standard tier", "Azure Functions (Blob trigger)", "AKS with a scheduled cron job"], a: 2, d: "medium", e: "Functions with a Blob trigger fits perfectly — pay per execution, no infrastructure to size." },
  { q: "You need a managed Kubernetes cluster with self-managed node pools. Best fit?", o: ["Azure VMs with kubeadm installed", "AKS (Azure Kubernetes Service)", "Azure Container Instances (ACI)", "App Service with container support"], a: 1, d: "medium", e: "AKS is the managed Kubernetes offering — the K8s control plane is managed; node pools are yours." },
  { q: "You need a fire-and-forget container to run for 20 minutes, no orchestrator. Best fit?", o: ["AKS with a one-shot Job", "Azure Virtual Machines with Docker", "Azure Container Instances (ACI)", "Azure Functions consumption plan", "App Service container plan"], a: 2, d: "medium", e: "ACI is single-container, serverless, per-second billing — perfect for fire-and-forget or batch container work." },
  { q: "A workload of stateless microservices needs KEDA-driven autoscale without deploying Kubernetes yourself. Best fit?", o: ["AKS with KEDA installed", "IaaS VMs with autoscale rules", "App Service Standard tier", "Azure Container Apps (managed)"], a: 3, d: "medium", e: "Container Apps is built on Kubernetes + KEDA + Dapr but abstracts the cluster — ideal for stateless microservices at scale." },
  { q: "You want a private connection from your on-prem datacentre to Azure that doesn't touch the public internet, with 10 Gbps and low latency. Choose:", o: ["ExpressRoute (private circuit)", "VPN Gateway (site-to-site)", "Azure Front Door (global edge)", "Traffic Manager (DNS routing)"], a: 0, d: "medium", e: "ExpressRoute is a private circuit — no public internet, higher bandwidth, better SLA." },
  { q: "Two employees need to connect to Azure resources from their laptops securely from home. Best option?", o: ["ExpressRoute private circuit", "Public IP exposure with firewall", "Traffic Manager DNS routing", "Point-to-site (P2S) VPN client", "Site-to-site VPN via office CPE"], a: 3, d: "medium", e: "P2S VPN gives individual clients an encrypted tunnel to Azure — ideal for remote workers." },
  { q: "You want to distribute HTTP traffic across two regions of a web app with URL-path routing and WAF. Best service?", o: ["Azure Load Balancer (L4 regional)", "Application Gateway (L7 regional)", "Traffic Manager alone (DNS only)", "Azure Bastion (SSH/RDP entry)", "Azure Front Door (L7 global)"], a: 4, d: "medium", e: "Front Door is L7 global with URL routing and WAF — the right tool for global HTTP with intelligent routing." },
  { q: "You need to load-balance TCP traffic among VMs in a single region. Best service?", o: ["Azure Load Balancer (L4)", "Application Gateway (L7)", "Traffic Manager (DNS)", "Front Door (L7 global)", "Azure Firewall (L3-7)"], a: 0, d: "medium", e: "L4 traffic + regional scope = Azure Load Balancer." },
  { q: "You need URL-based routing and TLS termination for a regional HTTP app. Best service?", o: ["Azure Load Balancer (L4)", "Traffic Manager (DNS)", "Front Door (L7 global)", "Application Gateway (L7)"], a: 3, d: "medium", e: "Application Gateway is L7 regional — URL routing, TLS termination, optional WAF." },
  { q: "You have failover to a secondary region with weighted DNS routing. Best service?", o: ["Load Balancer (L4)", "Application Gateway (L7)", "Traffic Manager (DNS)", "Front Door in DNS-only mode"], a: 2, d: "medium", e: "Traffic Manager is DNS-based global routing — priority, weighted, performance, geographic policies." },
  { q: "Two VNets in different regions need private connectivity. Best option?", o: ["Global VNet peering", "Public internet gateway", "Traffic Manager DNS routing", "Regional Load Balancer"], a: 0, d: "medium", e: "Global VNet peering connects VNets across regions over the Microsoft backbone privately." },
  { q: "You want private-IP access from your VNet to a specific Azure SQL Database instance. Which is best?", o: ["Public endpoint with firewall rules", "Service endpoint on the subnet", "Private endpoint (private IP in VNet)", "Traffic Manager DNS-based routing", "Azure Bastion tunneled access"], a: 2, d: "medium", e: "Private endpoints give a specific PaaS instance a private IP inside your VNet — the most secure option." },
  { q: "Which is TRUE about VMSS?", o: ["It cannot autoscale in any mode", "It is the same as an Availability Set", "It only supports Windows Server OS", "Horizontal scale-out with self-healing"], a: 3, d: "medium", e: "VMSS is horizontal scale for identical VMs — auto-scale, auto-heal, integrates with LB or App Gateway." },
  { q: "Which of these is a HORIZONTAL scaling action?", o: ["Resize a VM from D2 to D8", "Change disk from Standard to Premium", "Add three more VMs to a VMSS", "Move a VM to another region"], a: 2, d: "medium", e: "Adding more instances = horizontal scaling (scale out)." },
  { q: "Which of these is a VERTICAL scaling action?", o: ["Resize a VM to a larger SKU", "Add more VMs to a scale set", "Deploy to another region", "Add another load balancer"], a: 0, d: "medium", e: "Resizing (up or down) = vertical scaling." },
  { q: "The default number of fault domains in an Availability Set is:", o: ["2", "3", "5", "10"], a: 1, d: "medium", e: "Default is 3 fault domains and 5 update domains (configurable)." },
  { q: "A VMSS delivers what kind of scaling?", o: ["Vertical scaling only, no scale-out", "Region-level scaling by policy", "Manual scaling by admin only", "Horizontal scaling with autoscale"], a: 3, d: "medium", e: "VMSS = horizontal scaling of identical VMs, with optional autoscale rules." },
  { q: "Which service enables L7 HTTP routing to multiple Azure regions?", o: ["Load Balancer (L4 regional)", "Application Gateway (L7 regional)", "ExpressRoute (private circuit)", "Azure Front Door (L7 global)"], a: 3, d: "medium", e: "Front Door is L7 global — used for multi-region HTTP entry with WAF and CDN." },
  { q: "Which is TRUE about NSGs?", o: ["They are entirely stateless by design", "Can only be applied to subnets, not NICs", "Can only be applied to NICs, not subnets", "Stateful — return traffic is auto-allowed"], a: 3, d: "medium", e: "NSGs are stateful. Return traffic to allowed inbound is allowed automatically. They can be applied to subnets or NICs." },
  { q: "Which is TRUE about Application Security Groups (ASGs)?", o: ["Group VMs by role to simplify NSG rules", "They fully replace NSG functionality", "They provide managed DNS resolution", "They handle disk-level encryption"], a: 0, d: "medium", e: "ASGs let you write NSG rules against a role (like 'WebServers') instead of hard-coded IPs, making rules more maintainable." },
  { q: "Which connectivity option provides the HIGHEST bandwidth to Azure?", o: ["VPN Gateway (up to 10 Gbps)", "Traffic Manager (DNS routing)", "ExpressRoute (up to 100 Gbps)", "Azure Front Door (edge PoPs)"], a: 2, d: "medium", e: "ExpressRoute supports circuits up to 100 Gbps — far above what VPN Gateway can provide." },
  { q: "Which is TRUE about Azure Functions on the Consumption plan?", o: ["Cannot scale down to zero at all", "Scales to zero and bills per execution", "Requires a Dedicated App Service Plan", "Only supports the .NET runtime"], a: 1, d: "medium", e: "Consumption plan is serverless — scales to zero when idle, bills per execution + resource used." },
  { q: "Deployment slots in Azure App Service are used for:", o: ["Manual snapshot backups of the app", "Cross-region failover routing rules", "Cost-savings reservation discounts", "Automatic disk replication service", "Staging slots that swap to production"], a: 4, d: "medium", e: "Deployment slots let you deploy to a staging slot, warm it up, and swap to production with zero downtime." },
  { q: "You have a small dev VM that you use during business hours only. To minimize cost, what should you do at 6pm?", o: ["Delete the VM entirely each night", "Stop-deallocate the VM to free compute", "Restart the VM to reset the billing", "Leave the VM running overnight"], a: 1, d: "medium", e: "Stop-deallocating releases the VM from the host — compute stops billing while disk is retained." },
  { q: "You need Azure Firewall to allow outbound traffic to *.microsoft.com. Which rule type do you use?", o: ["Network rule (IP/port match)", "Application rule (FQDN match)", "NAT rule (inbound DNAT only)", "Route table (UDR next-hop)"], a: 1, d: "medium", e: "Application rules match on FQDN and support wildcards like *.microsoft.com. Network rules match on IP/port; NAT rules do inbound DNAT." },
  { q: "Which Azure Firewall tier adds IDPS (intrusion detection &amp; prevention) and TLS inspection?", o: ["Basic (SMB-focused)", "Standard (core stateful)", "Premium (IDPS + TLS)", "Enterprise (feature superset)"], a: 2, d: "medium", e: "Premium adds IDPS, TLS inspection, URL filtering, and web categories. Standard has core stateful rules; Basic targets SMB." },

  // ============ HARD ============
  { q: "You have two peered VNets (A ↔ B). VNet C is peered with B but not with A. Can VNet A talk to VNet C directly through B?", o: ["Yes — peering is fully transitive", "Only if all VNets in one region", "Only if a VPN Gateway is used", "No — peering is non-transitive"], a: 3, d: "hard", e: "VNet peering is non-transitive. A hub-and-spoke design uses a VPN Gateway or Firewall in the hub to route between spokes." },
  { q: "Which is TRUE about Front Door vs Application Gateway?", o: ["Both are global; both are regional", "They are the same product with two names", "Front Door is global; App Gateway is regional", "Application Gateway is only for internal apps"], a: 2, d: "hard", e: "Front Door is global L7. Application Gateway is regional L7. A common pattern: Front Door → Application Gateway → backend." },
  { q: "A VM in Availability Set with 3 fault domains and 5 update domains — how many combinations does Azure spread its VMs across?", o: ["3", "5", "8", "15"], a: 3, d: "hard", e: "Fault × Update = 3 × 5 = 15 combinations. VMs are spread across these combinations." },
  { q: "Which is TRUE about the SLA for a VM in an Availability Zone deployment?", o: ["Requires 2+ VMs across 2+ zones for 99.99%", "Same SLA as a single VM (99.9%)", "AZ deployment carries no defined SLA", "Only applies to Premium SSD-backed disks"], a: 0, d: "hard", e: "You need 2+ VMs across 2+ zones to get 99.99%. A single VM (even 'in a zone') still gets the single-VM SLA." },
  { q: "Which is TRUE about ExpressRoute security?", o: ["Encrypted by default at the network layer", "Not encrypted by default — add IPsec/MACsec", "Less secure than a public VPN tunnel", "Cannot carry regulated or sensitive data"], a: 1, d: "hard", e: "ExpressRoute provides a private circuit, not encryption by default. It's private, but if you need encryption you add IPsec on top." },
  { q: "You need to failover HTTP traffic to another region if the primary region's health check fails, with the lowest latency for users. Which service?", o: ["Azure Load Balancer (L4)", "Application Gateway (L7 regional)", "Traffic Manager (DNS performance)", "Azure Bastion (VM entry)", "Azure Front Door (edge failover)"], a: 4, d: "hard", e: "Front Door offers instant edge-based failover using health probes at Microsoft's PoPs — faster failover than DNS-based Traffic Manager." },
  { q: "Which is a valid difference between Traffic Manager and Front Door?", o: ["They are functionally identical services", "Front Door is DNS-only routing", "TM uses DNS; FD uses anycast HTTP", "Both are regional-scope services only"], a: 2, d: "hard", e: "Traffic Manager routes via DNS (subject to TTL). Front Door is a full anycast HTTP proxy at the edge — faster and more granular." },
  { q: "Which of these is TRUE about the AKS control plane?", o: ["Managed by Microsoft and free; only nodes billed", "It runs on customer VMs you provision", "You must patch it manually each release", "It requires ExpressRoute to be configured"], a: 0, d: "hard", e: "AKS control plane is free and managed by Microsoft. You pay only for the node pools (VMs) and any other Azure resources they use." },
  { q: "Which service is BEST for hosting a static website with global low-latency delivery?", o: ["Azure Load Balancer with a static VM", "Azure Kubernetes Service running nginx", "Azure Functions serving HTML content", "Storage static website + Front Door CDN"], a: 3, d: "hard", e: "Blob Storage's static website hosting + Front Door as global CDN/entry is a classic low-cost global static site." },
  { q: "Which is TRUE about VNet peering pricing?", o: ["Local per-GB charge; global costs more per GB", "Peering is entirely free of any charges", "Only global peering incurs a per-GB charge", "Peering is free within one subscription"], a: 0, d: "hard", e: "Peering has per-GB inbound and outbound charges, higher for cross-region (global) peering." },
  { q: "In which scenario is Azure Firewall PREFERRED over an NSG?", o: ["Simple allow/deny between two subnets", "Central FQDN filter with threat intel", "Encrypting data at rest on disks", "Load-balancing HTTP requests globally"], a: 1, d: "hard", e: "Azure Firewall is a full managed L4–L7 firewall — FQDN filtering, threat intelligence, and central management across VNets. NSGs are basic L3/L4 allow/deny." },
  { q: "Which of these is TRUE about Azure Bastion?", o: ["A managed site-to-site VPN service", "Browser-based RDP/SSH, no public VM IPs", "A drop-in replacement for NSG rule sets", "A regional HTTP load balancer service"], a: 1, d: "hard", e: "Azure Bastion provides secure browser-based RDP/SSH access to VMs without exposing them via public IPs — improves the security posture." },
  { q: "You need to run a workload for 30 minutes at extremely low cost, and it can be interrupted at any time. Best VM pricing option?", o: ["Reserved Instance (1-3 year term)", "Standard pay-as-you-go pricing", "Azure Hybrid Benefit licensing", "Savings Plan for Azure compute", "Spot VMs (up to 90% off, evictable)"], a: 4, d: "hard", e: "Spot VMs offer up to 90% discount but can be evicted with 30-second notice. Perfect for interruptible batch work." },
  { q: "Which service is BEST described as: managed containers with per-second billing, no orchestrator, single container per instance?", o: ["AKS with managed node pools", "Azure Container Instances (ACI)", "Azure Container Apps (KEDA)", "App Service with container plan"], a: 1, d: "hard", e: "ACI is fire-and-forget single-container hosting with per-second billing — no orchestrator required." },
  { q: "Two Azure services provide L7 load balancing but at different scopes. Which pairing is correct?", o: ["Load Balancer is L7; App Gateway is L4", "Front Door is L4; Traffic Manager is L7", "App Gateway L7 regional; Front Door L7 global", "Only Load Balancer supports L7 features"], a: 2, d: "hard", e: "Application Gateway = L7 regional. Front Door = L7 global. Both are HTTP/S-aware; scope differs." },
  { q: "You want to expose a private backend to a public IP:port on Azure Firewall via DNAT. Which rule type?", o: ["Application rule (FQDN match)", "Network rule (IP/port match)", "Route table (UDR next-hop)", "NAT rule (inbound DNAT)"], a: 3, d: "hard", e: "NAT rules translate an inbound public IP:port to a backend private IP:port (DNAT). Application/Network rules are for outbound and east-west traffic control." }
];
</script>

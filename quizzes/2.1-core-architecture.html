<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2.1 Core architecture · AZ-900 quiz</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
<div class="container">

  <header class="q-header">
    <div class="q-crumb"><a href="index.html">All quizzes</a><span class="sep">Domain 2 · Architecture and services</span></div>
    <h1 class="q-title">Core architecture</h1>
    <p class="q-subtitle">Regions, availability zones, sovereign regions, resource hierarchy, ARM.</p>
  </header>

  <div id="setup">
    <p class="setup-intro">Choose a difficulty tier. Easy tests recall, Medium tests scenarios, Hard tests distractor traps.</p>
    <div class="setup-diff">
      <button class="start-btn diff-easy" data-difficulty="easy"><span class="btn-label">Tier · Recall</span><span class="btn-title">Easy</span><span class="btn-count" id="count-easy">— questions</span></button>
      <button class="start-btn diff-medium" data-difficulty="medium"><span class="btn-label">Tier · Scenarios</span><span class="btn-title">Medium</span><span class="btn-count" id="count-medium">— questions</span></button>
      <button class="start-btn diff-hard" data-difficulty="hard"><span class="btn-label">Tier · Gotchas</span><span class="btn-title">Hard</span><span class="btn-count" id="count-hard">— questions</span></button>
      <button class="start-btn diff-all" data-difficulty="all"><span class="btn-label">All tiers</span><span class="btn-title">Full quiz</span><span class="btn-count" id="count-all">— questions</span></button>
    </div>
  </div>

  <div id="quiz" style="display: none;">
    <div class="q-progress"><span>Q<span id="q-num">1</span> / <span id="q-total">0</span></span><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div></div>
    <div class="q-card">
      <div class="q-meta"><span class="chip diff-easy" id="q-difficulty">easy</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
      <div class="feedback" id="feedback"><div class="feedback-verdict" id="feedback-verdict"></div><div class="feedback-explanation" id="feedback-explanation"></div></div>
      <div class="q-controls"><span></span><button class="btn btn-primary" id="next-btn" style="display: none;">Next question</button></div>
    </div>
  </div>

  <div id="results" style="display: none;">
    <div class="results-hero">
      <div class="score-pct" id="score-pct">0%</div>
      <div class="score-fraction"><span id="score-num">0</span> of <span id="score-total">0</span> correct</div>
      <div class="verdict" id="score-verdict"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-primary" id="retry-btn">Retry same tier</button>
      <button class="btn btn-secondary" id="back-btn">Change tier</button>
    </div>
    <h2 class="review-title">Review</h2>
    <div id="review"></div>
  </div>

</div>

<script>
window.QUIZ_META = { title: "Core architecture", code: "2.1", domain: "Domain 2" };

window.QUIZ_QUESTIONS = [
  // EASY
  { q: "What is an Azure region?", o: ["Datacentres inside a latency perimeter, on one regional network", "A single Microsoft-owned datacentre in a specific city", "A country or territory where Azure services are sold", "A pricing and billing zone used for customer invoicing"], a: 0, d: "easy", e: "An Azure region is a set of datacentres connected by a dedicated low-latency regional network, within a latency-defined perimeter." },
  { q: "Approximately how many Azure regions exist globally?", o: ["Around 10 regions worldwide", "Around 25 regions worldwide", "Around 500 regions worldwide", "60+ regions worldwide"], a: 3, d: "easy", e: "Azure has 60+ regions worldwide — more than any other cloud provider." },
  { q: "What is an Availability Zone?", o: ["Separate DCs in one region with independent power and network", "A pair of datacentres located in different geographies", "The physical continent hosting an Azure region", "A subscription-level fault isolation boundary"], a: 0, d: "easy", e: "An AZ is one or more datacentres inside a region with independent power, cooling, and networking. AZ-enabled regions have a minimum of 3 zones." },
  { q: "Zone-enabled Azure regions have a MINIMUM of how many availability zones?", o: ["1 availability zone", "2 availability zones", "3 availability zones", "5 availability zones"], a: 2, d: "easy", e: "Every zone-enabled region has a minimum of 3 physically separate availability zones." },
  { q: "What is an Azure 'region pair'?", o: ["Two zones within a region that back each other up", "A production region plus a backup datacentre in another city", "Two adjacent regions used for load balancing traffic", "Two regions in one geography paired for DR replication"], a: 3, d: "easy", e: "Region pairs are two regions in the same geography (e.g. West Europe ↔ North Europe) used for cross-region DR and staggered updates." },
  { q: "Region pairs are typically how far apart?", o: ["Located adjacent to each other in the same campus", "Roughly 300 miles or more apart within a geography", "Approximately 100 kilometres apart on average", "Almost always on different continents entirely"], a: 1, d: "easy", e: "Region pairs are typically 300+ miles apart to isolate them from a common disaster." },
  { q: "Which of these is a sovereign Azure region?", o: ["Azure Government, isolated for US federal customers", "West Europe, hosted in Amsterdam datacentres", "East US, hosted in Virginia datacentres", "UK South, hosted in London-area datacentres"], a: 0, d: "easy", e: "Azure Government (US) is a sovereign region — a physically isolated instance of Azure for US federal, state, and local government + contractors." },
  { q: "Azure China is operated by:", o: ["Microsoft's China subsidiary directly", "21Vianet, a licensed Chinese partner", "Alibaba Cloud in partnership with Microsoft", "Baidu Cloud under a Microsoft license"], a: 1, d: "easy", e: "Azure China is operated by 21Vianet (not by Microsoft), physically isolated from global Azure." },
  { q: "In Azure's resource hierarchy, what sits ABOVE subscriptions?", o: ["Resource groups that contain the subscriptions", "Regions where the subscriptions are deployed", "Management groups used for scaled governance", "Datacentres that host the subscription workloads"], a: 2, d: "easy", e: "Management groups sit above subscriptions for scaled governance across many subs." },
  { q: "How many levels deep can management groups be nested (excluding the root)?", o: ["Up to 3 levels of nesting under the root", "Up to 5 levels of nesting under the root", "Unlimited nesting levels under the root", "Up to 6 levels of nesting under the root"], a: 3, d: "easy", e: "Up to 6 levels of management group nesting below the root are supported." },
  { q: "What is a resource group?", o: ["A logical container for related Azure resources", "A billing account tied to a payment method", "A physical datacentre building in a region", "A specific type of Azure subscription plan"], a: 0, d: "easy", e: "A resource group is a logical container that holds related Azure resources for a common lifecycle." },
  { q: "Every Azure resource must belong to exactly:", o: ["Zero resource groups; membership is optional", "As many resource groups as needed for tagging", "Exactly one resource group at any given time", "Two resource groups (a primary and a backup)"], a: 2, d: "easy", e: "Every resource lives in exactly one resource group at any time. It can be moved, with some limitations." },
  { q: "What is ARM (Azure Resource Manager)?", o: ["The internal billing engine for Azure invoices", "The default Azure metrics and logs collector", "A managed container orchestration platform", "The unified control plane for all Azure requests"], a: 3, d: "easy", e: "ARM is Azure's unified deployment and management layer. Every Portal/CLI/PowerShell/REST call goes through ARM." },
  { q: "A subscription in Azure is:", o: ["A physical datacentre where resources are stored", "A billing and access container for resource groups", "A user identity used for signing into the portal", "A virtual network that spans one or more regions"], a: 1, d: "easy", e: "A subscription is a billing + access-management container. It holds resource groups and has one associated billing account." },
  { q: "When you delete a resource group in Azure:", o: ["All resources inside the resource group are deleted", "Only the resource group itself is removed", "Only unlocked resources inside are removed", "The resource group cannot be deleted directly"], a: 0, d: "easy", e: "Deleting a resource group deletes ALL resources within it. RG = lifecycle boundary." },
  { q: "In Azure, an individual VM lives in exactly:", o: ["Multiple regions simultaneously for redundancy", "Multiple resource groups spanning the tenant", "One region and one resource group at a time", "A geography, but no specific region beneath it"], a: 2, d: "easy", e: "A resource lives in exactly one region and one resource group." },
  { q: "Which are Azure's sovereign / dedicated regions?", o: ["West US and East US, the two flagship regions", "UK South and UK West for UK data residency", "There are no sovereign regions — all are equal", "Azure Government (US) and Azure China (21Vianet)"], a: 3, d: "easy", e: "Azure Government (US) and Azure China (21Vianet) are the current sovereign instances of Azure." },
  { q: "Some Azure services are 'global', meaning:", o: ["They are physically deployed to every region at once", "They have no region — examples include Entra ID and DNS", "They are only available in the United States", "They are experimental services not yet generally available"], a: 1, d: "easy", e: "Global services (Entra ID, Front Door, Traffic Manager, DNS) don't have a region — they're provided by Azure's global infrastructure." },
  { q: "A resource group has a region property. Can it contain resources from other regions?", o: ["No, all resources must match the RG's own region", "Yes, the RG's region is metadata — resources can be elsewhere", "Only if the resource group is in West Europe", "Only when the resource group is in a sovereign region"], a: 1, d: "easy", e: "The RG's region is metadata (where the RG's info is stored). Resources within can be in any region." },
  { q: "A tenant in Microsoft Entra ID has how many root management groups?", o: ["Zero root management groups by default", "One root management group per subscription", "An unlimited number, one per department", "Exactly one root management group per tenant"], a: 3, d: "easy", e: "Every tenant has exactly one root management group at the top of the hierarchy." },
  { q: "What is the target round-trip network latency between datacentres inside a single Azure region?", o: ["Under 2 milliseconds round-trip", "Under 20 milliseconds round-trip", "Under 100 milliseconds round-trip", "Under 500 milliseconds round-trip"], a: 0, d: "easy", e: "Datacentres within a region are connected by a dedicated backbone with round-trip latency under 2 ms." },

  // MEDIUM
  { q: "You need to protect a workload from a single-datacentre failure inside a region. Which Azure feature helps?", o: ["Availability Sets, which spread VMs across racks in one DC", "Locally Redundant Storage inside a single datacentre", "Availability Zones, which spread VMs across separate DCs", "Region pairs, which pair two regions in one geography"], a: 2, d: "medium", e: "Availability Zones use separate physical datacentres within a region — protection against a full-DC outage." },
  { q: "You need to protect a workload from a region-wide outage. Which Azure feature helps?", o: ["Availability Sets with multiple fault domains", "Availability Zones across the affected region", "Fault domains inside a single Azure region", "Region pairs with cross-region replication"], a: 3, d: "medium", e: "Region-wide protection requires deploying to a paired region (with geo-redundant data / GRS)." },
  { q: "Which is TRUE about region pairs?", o: ["They are always located in different countries", "They are usually adjacent within the same city", "They cannot be used for disaster recovery scenarios", "They only apply to storage accounts, not to VMs", "Same geography, 300+ miles apart, with staggered updates"], a: 4, d: "medium", e: "Region pairs are typically 300+ miles apart in the same geography, with Azure staggering their updates so both aren't updated at once." },
  { q: "You must deploy Azure resources ONLY into approved regions. Which Azure feature enforces this?", o: ["Azure Policy with an 'Allowed locations' rule", "Availability Sets restricted to certain regions", "Region pairs that block unapproved regions", "Availability Zones limited to allowed regions"], a: 0, d: "medium", e: "Azure Policy with 'Allowed locations' effect enforces region restrictions on deployments." },
  { q: "Which of these BEST describes a fault domain in an Availability Set?", o: ["A geographic zone spanning multiple regions", "A subscription boundary between environments", "A billing zone used for cross-charging teams", "A rack with its own independent power and network"], a: 3, d: "medium", e: "Fault domains represent racks (or logical failure groups). VMs in a set are distributed across FDs so a rack failure doesn't take all of them down." },
  { q: "What are Update Domains in an Availability Set?", o: ["VMs that Azure reboots together during planned maintenance", "Geographic zones where Azure updates roll out first", "Subscription rollout groups for feature previews", "Regions where new firmware updates apply immediately"], a: 0, d: "medium", e: "Update domains group VMs that will be updated together. Only one UD is updated at a time, preserving service." },
  { q: "You need to apply an Azure Policy to ALL current and future subscriptions in your organisation. Where should you assign it?", o: ["At each individual resource group under every sub", "At each individual resource, one at a time", "At every region where the subscriptions exist", "At the subscription level, one assignment each", "At the tenant root management group, so it cascades"], a: 4, d: "medium", e: "Policies applied at the root management group cascade to every child MG, subscription, RG, and resource." },
  { q: "You want to enforce different governance rules for Dev vs Prod subscriptions. Which structure helps?", o: ["Put both under the tenant root management group only", "Rely on RBAC assignments at each resource group", "Create two separate Entra ID tenants for isolation", "Separate MGs for Dev and Prod, with policies at each", "Tag every resource with 'dev' or 'prod' for governance"], a: 3, d: "medium", e: "Separate MGs for Dev and Prod let you apply different policies + role assignments at each MG scope." },
  { q: "Which best describes the CORRECT top-down hierarchy?", o: ["Tenant → MGs → Subscriptions → Resource Groups → Resources", "Subscriptions → MGs → Resource Groups → Resources", "Regions → Availability Zones → Resource Groups → Resources", "Resource Groups → Subscriptions → Regions → Resources"], a: 0, d: "medium", e: "The hierarchy is: Tenant → Root MG → MGs (up to 6 deep) → Subscriptions → Resource Groups → Resources." },
  { q: "You need to give an outside contractor access to only one project's resources for a limited time. Best approach?", o: ["Move all their resources into a new subscription as owner", "Create a project RG and grant RBAC only at that RG scope", "Assign them Global Administrator on the whole tenant", "Grant them Owner at the management group level"], a: 1, d: "medium", e: "RGs are natural scoping boundaries for project-based access. Assign minimum RBAC at the RG scope." },
  { q: "Which is TRUE about Azure Resource Manager (ARM)?", o: ["ARM is primarily a monitoring and observability service", "Every deployment goes through ARM, whatever tool is used", "ARM is a synonym for ARM templates and Bicep files", "ARM only handles virtual machines, not other services", "ARM is the Azure billing and invoicing subsystem"], a: 1, d: "medium", e: "ARM is the control plane. Portal, CLI, PowerShell, REST — everything ultimately calls ARM's APIs." },
  { q: "Which is TRUE about services offered in Azure Government vs commercial Azure?", o: ["Azure Government has Front Door but commercial does not", "Azure Government has SQL Database but commercial does not", "Azure Government has Cosmos DB but commercial does not", "Same services as commercial, with extra compliance controls"], a: 3, d: "medium", e: "Azure Government offers most of the same services as commercial Azure but with additional compliance requirements and restricted personnel access." },
  { q: "The SLA for a VM inside an Availability Set is:", o: ["99.9% SLA (single VM tier)", "99.95% SLA (Availability Set tier)", "99.99% SLA (Availability Zone tier)", "99% SLA (no VM redundancy tier)"], a: 1, d: "medium", e: "Availability Sets deliver 99.95% by distributing VMs across fault and update domains inside a single datacentre." },
  { q: "The SLA for a VM deployed across multiple Availability Zones is:", o: ["99.9% SLA (single VM tier)", "99.95% SLA (Availability Set tier)", "99.99% SLA (Availability Zone tier)", "99% SLA (no VM redundancy tier)"], a: 2, d: "medium", e: "Availability Zones (across separate DCs in a region) deliver 99.99% — Azure's top single-region VM SLA." },
  { q: "A single VM using Premium SSD in Azure receives what SLA?", o: ["99.9% SLA (single VM with Premium SSD)", "99.95% SLA (Availability Set tier)", "99.99% SLA (Availability Zone tier)", "No SLA is offered for single VMs"], a: 0, d: "medium", e: "A single VM with Premium SSD (or Ultra Disk) gets 99.9%. Availability Set → 99.95%. Availability Zones → 99.99%." },
  { q: "Which is TRUE about resource groups?", o: ["A resource can belong to multiple RGs at once", "RGs cannot be deleted once resources are inside", "RGs must be in the same region as their resources", "Deleting the RG deletes every resource inside it"], a: 3, d: "medium", e: "Deleting an RG deletes everything in it. That's why locks are important on production RGs." },
  { q: "A company has 50 subscriptions and wants to apply one identical Policy to all of them. Best approach?", o: ["Assign the policy to each subscription individually", "Enforce it manually through custom RBAC roles", "Group the 50 subs under one MG and assign the policy there", "Automate assignment with an ARM template per sub", "This is not currently possible in Azure Policy"], a: 2, d: "medium", e: "MGs let one Policy assignment govern many subscriptions via inheritance." },
  { q: "Which is TRUE about Azure services that are 'global' (no region)?", o: ["They must be deployed to every region individually", "Examples: Entra ID, Azure DNS, Front Door, Traffic Manager", "They are only functional in the US commercial region", "They cannot be used in production workloads at all"], a: 1, d: "medium", e: "Global services live in Microsoft's global fabric — they're not tied to a specific region." },
  { q: "You need to move a set of resources to a different subscription. Which is TRUE?", o: ["Not possible — resources are permanently tied to a sub", "Requires deleting and redeploying every affected resource", "Only possible with a paid Microsoft migration engagement", "Only allowed within the same region and geography", "Supported by ARM 'move', with per-service limitations"], a: 4, d: "medium", e: "ARM supports moving resources between RGs and between subscriptions — with some service-specific restrictions." },
  { q: "Which describes an Azure geography correctly?", o: ["A single datacentre building in a specific city", "A subscription boundary used for RBAC scoping", "A market with data-residency, often multiple regions", "A billing zone that determines Azure list prices", "A pair of regions used for cross-region DR replication"], a: 2, d: "medium", e: "A geography (e.g. United States, Europe) is a market boundary. Each geography contains one or more Azure regions." },
  { q: "How far apart are Azure region pairs typically located?", o: ["Adjacent datacentres inside the same campus", "Roughly 300 or more miles within one geography", "Anywhere inside the same metropolitan city", "On different continents in different geographies"], a: 1, d: "medium", e: "Region pairs are typically 300+ miles apart to survive a broad regional disaster, but almost always within the same geography for data-residency reasons." },

  // HARD
  { q: "Which is CORRECT about Availability Zones vs Availability Sets?", o: ["Both features protect against a full datacentre failure", "AZs and Availability Sets are functionally identical", "Only AZs are supported for Premium SSD-backed VMs", "Availability Sets protect against region-wide outages", "AS = rack-level in one DC; AZ = DC-level across a region"], a: 4, d: "hard", e: "Availability Sets: rack-level (in one DC). AZs: DC-level (across separate DCs in a region). Different scopes." },
  { q: "Which is TRUE about the root management group in a tenant?", o: ["There is exactly one, and it cannot be deleted", "It can be deleted by a Global Administrator", "There can be multiple root MGs per Entra tenant", "Only Enterprise Agreement customers get a root MG"], a: 0, d: "hard", e: "Every tenant has one root MG. It cannot be deleted; you inherit governance from it downward." },
  { q: "Which of the following can NOT be locked with an Azure resource lock?", o: ["An entire Azure subscription and its children", "A resource group inside a subscription", "A management group above the subscriptions", "An individual resource like a VM or storage account"], a: 2, d: "hard", e: "Resource locks work at subscription, resource group, or individual resource scope — NOT at management group scope." },
  { q: "You need very low latency between two Azure workloads. Which placement matters MOST?", o: ["The same subscription for shared billing/limits", "The same region, ideally the same availability zone", "The same resource group as a logical container", "The same Entra ID tenant for identity alignment"], a: 1, d: "hard", e: "Latency is a physical/geographic property. Same region (or same AZ) is what matters. Subscription/RG are logical containers." },
  { q: "Which is TRUE about sovereign Azure regions?", o: ["Sovereign regions are ordinary regions with restrictions", "There are no sovereign Azure regions any more", "Sovereign regions are simply a subscription tier", "Sovereign regions share the commercial portal and URLs", "Separate Azure instances with their own portals and URLs"], a: 4, d: "hard", e: "Sovereign regions like Azure Government and Azure China are entirely separate instances of Azure with their own portals and identity boundaries." },
  { q: "Which is INCORRECT about Azure regions?", o: ["Some regions do not support Availability Zones", "Regions are grouped into geographies for compliance", "Some services are only available in certain regions", "Every region has a minimum of three availability zones", "Regions belong to exactly one geography at a time"], a: 3, d: "hard", e: "Not every region is zone-enabled. Zone-enabled regions have a minimum of 3 AZs; other regions have zero." },
  { q: "A resource has been moved from RG1 to RG2. Which of these does NOT change?", o: ["The Azure region where the resource physically runs", "The resource's full ARM ID / resource path", "Its resource group scope for RBAC inheritance", "The RBAC assignments inherited from its new RG"], a: 0, d: "hard", e: "Moving a resource between RGs changes its ID (which includes the RG name) and its inherited RBAC — but not the region it lives in." },
  { q: "Which is TRUE about the relationship between subscriptions and Entra ID tenants?", o: ["A subscription can span multiple Entra tenants", "Every Entra ID tenant has exactly one subscription", "A subscription is tied to exactly one tenant at a time", "Subscriptions exist without any Entra tenant behind them"], a: 2, d: "hard", e: "A subscription is associated with one Entra ID tenant. The tenant provides the identities and RBAC for the subscription." },
  { q: "Which best describes the difference between region and region pair for DR?", o: ["A region pair is a single region; a region is many", "Region pairs are used for HA and regions for DR", "There is no functional difference between the two", "Region = where you deploy; pair = partner for GRS + DR"], a: 3, d: "hard", e: "A region is where you deploy. Its region pair is the partner region used by GRS storage replication, staggered updates, and recovery ordering." },
  { q: "Which is TRUE about deploying a workload across multiple AZs vs a region pair?", o: ["AZs protect against a full-region outage; pairs do not", "AZs and region pairs solve exactly the same problem", "You must choose one or the other, never both together", "Multi-AZ handles DC failure; pair handles region loss"], a: 3, d: "hard", e: "AZs → DC-level HA. Region pairs → cross-region DR. Robust designs use both." },
  { q: "The physical hierarchy in Azure (top down) is:", o: ["Region → Geography → Availability Zone → Datacentre", "Geography → Region → Availability Zone → Datacentre", "Datacentre → Region → Geography → Availability Zone", "Availability Zone → Region → Geography → Datacentre", "Geography → Availability Zone → Region → Datacentre"], a: 1, d: "hard", e: "Top-down physical hierarchy: Geography → Region → Availability Zone → Datacentre." },
  { q: "Which of these is a SHARED responsibility even when using an Availability Set?", o: ["You must design the app to handle instance failure", "Azure guarantees zero downtime for AS workloads", "Azure handles application state and data recovery", "You must manually place each VM into a fault domain"], a: 0, d: "hard", e: "Availability Sets guarantee only that VMs are spread across FDs/UDs. The customer must architect the app to survive an instance restart (statelessness, LB, health checks)." }
];
</script>
<script src="quiz.js"></script>
</body>
</html>
